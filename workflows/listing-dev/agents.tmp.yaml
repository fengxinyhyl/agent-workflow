# Agent 配置
# 本文件为纳入版本库的默认模板：命令使用通用默认（claude/codex），开箱即用。
# 个人专用 wrapper（如 cc-opus/cc-deepseek）在本地未跟踪的 agents.yaml 中覆盖。
#
# 权限模型:
#   - 写文档类节点：permission_mode=default + Write 工具
#   - 执行类节点：  permission_mode=auto    + Bash/Edit 工具
#   - 审计类节点：  permission_mode=default + 只读工具

agents:
  claude:
    provider: claude
    command: "claude"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write"
    timeout_seconds: 3600
    description: "Claude Opus — 计划编写与总结"

  deepseek:
    provider: claude
    command: "claude"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write"
    timeout_seconds: 3600
    description: "Claude DeepSeek — 审查与审计"

  codex:
    provider: codex
    command: "codex"
    cwd: "{project_root}"
    permission_mode: auto
    allowed_tools: "Read,Grep,Glob,Write,Edit,Bash"
    sandbox: workspace-write
    timeout_seconds: 7200
    description: "Codex — 代码执行"
