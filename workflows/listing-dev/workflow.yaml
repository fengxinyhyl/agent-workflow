# listing-dev Workflow
# 标准开发链: plan → review → implement → audit → summary
#
# 核心链路:
#   plan → review
#     approve → implement
#     revise  → plan (回到计划)
#     reject  → failed
#   implement → audit
#     approve → summary
#     revise  → implement (修改代码)
#     reject  → failed
#   summary → done

name: listing-dev
version: "1"
description: |
  标准开发工作流: Plan → Review → Implement → Audit → Summary

initial_state: plan

# Guard 配置
guards:
  max_visits: 5              # 每条 state 最多访问 5 次（防止 review/revise 无限循环）
  max_duration_minutes: 480  # 最长运行 8 小时
  max_retries: 3             # 每个 state 最多重试 3 次
  on_guard_failed: failed

# 终止状态
terminal_states:
  - done
  - failed
  - cancelled

# 必需的 Skills
required_skills:
  - agent-workflow-lifecycle

# Task 定义
tasks:
  plan:
    instruction: |
      根据 goal 编写实现计划。计划必须包含:
      1. 需求分析 — 明确要实现什么
      2. 实现步骤 — 每个步骤要具体、可验证
      3. 涉及的文件列表 — 新建/修改哪些文件
      4. 测试策略 — 如何验证正确性
      5. 风险点 — 潜在问题及应对
      6. 停止规则 — 何时应该放弃
    agent: claude
    input:
      - goal
      - project_context
    output: plan_doc
    allowed_decisions:
      - done
      - fail
      - blocked

  review_plan:
    instruction: |
      审查实现计划。从以下维度评估:
      1. 完整性 — 是否覆盖所有功能点
      2. 正确性 — 技术方案是否可行
      3. 简洁性 — 是否存在过度设计
      4. 测试覆盖 — 是否定义了足够的验证手段
      5. 风险 — 是否识别了关键风险

      输出 approve（可以执行）、revise（需要修改）或 reject（不可行）。
    agent: deepseek
    input:
      - plan_doc
      - project_context
    output: review_doc
    allowed_decisions:
      - approve
      - revise
      - reject

  implement:
    instruction: |
      按照已批准的实现计划执行代码变更。
      严格按照计划步骤进行，不要跳过验证步骤。
      如执行中发现计划有问题，输出 blocked 并说明原因。
    agent: codex
    input:
      - plan_doc
      - review_doc
      - project_context
    output: execution_report
    allowed_decisions:
      - done
      - fail
      - blocked

  audit:
    instruction: |
      审计代码变更。检查:
      1. 是否按照计划执行 — 无遗漏无多余
      2. 代码质量和风格 — 与项目已有代码一致
      3. 测试通过 — 所有验证手段通过
      4. 无安全/性能问题
      5. 边界情况覆盖

      输出 approve（通过）、revise（需要修改）或 reject（不可接受）。
    agent: deepseek
    input:
      - plan_doc
      - execution_report
      - diff
    output: audit_report
    allowed_decisions:
      - approve
      - revise
      - reject

  summary:
    instruction: |
      生成工作流总结报告。包含:
      1. 执行摘要 — 完成了什么
      2. 关键决策 — approve/revise 及原因
      3. 产物流清单 — 所有生成的文件
      4. 待办事项 — 遗留问题或后续建议
    agent: claude
    input:
      - plan_doc
      - execution_report
      - audit_report
    output: summary_report
    allowed_decisions:
      - done
      - fail

# State 定义
states:
  plan:
    task: plan
    on:
      done: review
      fail: failed
      blocked: failed
    default: failed
    description: "编写实现计划"

  review:
    task: review_plan
    on:
      approve: implement
      revise: plan
      reject: failed
    default: failed
    description: "审查实现计划"

  implement:
    task: implement
    on:
      done: audit
      fail: failed
      blocked: audit
    default: failed
    description: "执行代码变更"

  audit:
    task: audit
    on:
      approve: summary
      revise: implement
      reject: failed
    default: failed
    description: "审计代码变更"

  summary:
    task: summary
    on:
      done: done
      fail: failed
    default: failed
    description: "生成总结报告"

  done:
    task: ""
    terminal: true
    description: "工作流成功完成"

  failed:
    task: ""
    terminal: true
    description: "工作流失败终止"

  cancelled:
    task: ""
    terminal: true
    description: "工作流被取消"
