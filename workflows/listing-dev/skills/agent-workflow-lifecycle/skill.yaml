# agent-workflow-lifecycle Skill
# 所有工作流 Agent 必需的基础契约

name: agent-workflow-lifecycle
version: "1"
description: |
  Agent Workflow 生命周期契约。
  所有参与工作流的 Agent 必须遵守此契约。

# 核心规则
rules:
  staging_only:
    description: "Agent 只能写入 staging 路径，禁止直接写入 artifacts/"
    enforcement: strict

  task_result_required:
    description: "每次任务结束时必须输出标准 TaskResult JSON"
    enforcement: strict

  no_secrets:
    description: "禁止读取或输出 .env、密钥、数据库凭证等敏感内容"
    enforcement: strict

  schema_compliance:
    description: "输出必须符合 TaskResult schema（schema_version >= 1）"
    enforcement: strict

  path_containment:
    description: "所有输出文件路径必须在 run_root/staging/<state>/ 之下"
    enforcement: strict
