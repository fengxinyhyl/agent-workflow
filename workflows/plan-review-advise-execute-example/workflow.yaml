# plan-review-advise-execute Workflow
# 通用四阶段链路示例: Plan → Review → Advise → Execute
#
# 核心链路:
#   plan → review
#     approve → execute
#     advise  → advise → plan        （回流：带着修改建议重做计划）
#     reject  → failed
#   execute → done | failed

name: plan-review-advise-execute
version: "1"
description: |
  通用四阶段编排: Plan 编写计划 → Review 审查 → Advise 给出修改建议（回流）→ Execute 执行

initial_state: plan

guards:
  max_visits: 5
  max_duration_minutes: 120
  max_retries: 3
  on_guard_failed: failed

terminal_states:
  - done
  - failed
  - cancelled

required_skills:
  - agent-workflow-lifecycle

tasks:
  plan:
    instruction: |
      根据 goal 编写实现计划。若收到 advice_doc，必须逐条回应修改建议。
      计划必须包含:
      1. 实现步骤（bite-sized 为佳）
      2. 涉及的文件列表
      3. 测试策略
      4. 风险点
      5. 停止规则
    agent: cc-opus
    input:
      - goal
      - project_context
      - advice_doc
    output: plan_doc
    allowed_decisions:
      - done
      - fail
      - blocked

  review:
    instruction: |
      审查实现计划。从以下维度评估:
      1. 完整性 — 是否覆盖所有功能点
      2. 正确性 — 技术方案是否可行
      3. 测试覆盖 — 是否定义了足够的测试
      4. 风险 — 是否识别了关键风险
      5. 复杂度 — 是否可以简化

      输出 approve（可以执行）、advise（需要带建议重做计划）或 reject（不可行）。
    agent: cc-deepseek
    input:
      - plan_doc
      - project_context
    output: review_doc
    allowed_decisions:
      - approve
      - advise
      - reject

  advise:
    instruction: |
      针对审查意见，给出具体、可执行的修改建议。必须明确:
      1. 哪些问题必须修复（blocking）
      2. 建议的修改方向
      3. 不采纳的审查意见及原因
    agent: cc-opus
    input:
      - plan_doc
      - review_doc
    output: advice_doc
    allowed_decisions:
      - done
      - fail
      - blocked

  execute:
    instruction: |
      按照已批准的实现计划执行代码变更。
      严格按照计划步骤进行，不要跳过验证步骤。
      如果计划在执行中发现问题，输出 blocked 并说明原因。
    agent: codex
    input:
      - plan_doc
      - project_context
    output: execution_report
    allowed_decisions:
      - done
      - fail
      - blocked

states:
  plan:
    task: plan
    on:
      done: review
      fail: failed
      blocked: failed
    default: failed
    description: "编写实现计划"

  review:
    task: review
    on:
      approve: execute
      advise: advise
      reject: failed
    default: failed
    description: "审查实现计划"

  advise:
    task: advise
    on:
      done: plan
      fail: failed
      blocked: failed
    default: failed
    description: "给出修改建议并回流到 plan"

  execute:
    task: execute
    on:
      done: done
      fail: failed
      blocked: failed
    default: failed
    description: "执行代码变更"

  done:
    task: ""
    terminal: true
    description: "工作流成功完成"

  failed:
    task: ""
    terminal: true
    description: "工作流失败终止"

  cancelled:
    task: ""
    terminal: true
    description: "工作流被取消"
