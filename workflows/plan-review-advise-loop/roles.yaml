# Role 配置 — 将 role 名映射到具体 agent
#
# workflow.yaml 中 task.role 引用此处的 role 名，
# role.agent 再引用 agents.yaml 中的 agent 名。

roles:
  planner:
    agent: claude
    fallback_agents: [codex]
    description: "实验计划编写"

  reviewer:
    agent: codex
    fallback_agents: [claude]
    description: "计划审核"

  advisor:
    agent: claude
    fallback_agents: [codex]
    description: "审核意见采纳裁决"

  executor:
    agent: claude
    fallback_agents: [codex]
    description: "实验执行"

  summarizer:
    agent: claude
    fallback_agents: [codex]
    description: "最终总结"
