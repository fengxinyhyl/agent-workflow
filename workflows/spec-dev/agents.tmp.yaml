# Agent 配置
# 本文件为纳入版本库的默认模板：命令使用通用默认（claude/codex），开箱即用。
# 个人专用 wrapper（如 cc-opus/cc-deepseek）在本地未跟踪的 agents.yaml 中覆盖。

agents:
  claude:
    provider: claude
    command: "claude"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write"
    timeout_seconds: 3600
    description: "Claude Opus — 列计划/修订计划/总结"

  deepseek:
    provider: claude
    command: "claude"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write,Edit,Bash"
    timeout_seconds: 3600
    description: "Claude DeepSeek — 审核计划/执行任务/修订任务"

  codex:
    provider: codex
    command: "codex"
    cwd: "{project_root}"
    sandbox: workspace-write
    timeout_seconds: 7200
    description: "Codex — 审核结果/校验测试"
