skill:
  name: dev-review
  version: "1"
  description: "开发计划审核节点规范"
  policy:
    allowed_decisions:
      - approve
      - revise
      - reject
      - fail
      - blocked
    forbidden_actions:
      - "在审核阶段修改代码"
      - "把审核意见直接当成最终采纳决定"
  content: |
    # Dev Review Node

    审核节点只审查计划质量，不执行代码，不修改计划。

    ## 审核维度

    - 完整性
    - 正确性
    - 测试覆盖
    - 风险和安全边界
    - 复杂度和可维护性

    ## 输出要求

    明确列出 blocking issues、major risks、missing evidence、
    suggested revisions 和 do-not-change constraints。

    ## Decision

    - `approve`: 计划可执行。
    - `revise`: 计划存在可修订问题。
    - `reject`: 计划或目标不可接受。
