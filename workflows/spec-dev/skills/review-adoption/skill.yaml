skill:
  name: review-adoption
  version: "1"
  description: "审核意见采纳节点规范"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    forbidden_actions:
      - "在采纳阶段修改代码"
      - "无记录地忽略 blocking review item"
  content: |
    # Review Adoption Node

    采纳节点负责把审核意见转化为可执行的修订记录和**完整修订后计划**。
    下游 execution 直接以本产物 latest 为权威计划执行，故产物必须自包含、无歧义。

    ## 必须记录

    - 每条审核意见的处理状态（采纳 / 延后 / 不采纳及理由）
    - 已采纳的修改
    - 完整的修订后计划（自包含，不要求下游合并 diff）

    ## 落盘约束（必须小块分批写，违反会导致 agent 崩溃/空转）

    本产物一定超过单次工具调用输出上限。血泪教训（260715 run 两次失败）：一次 Write 整份 →
    JSON 截断反复 InputValidationError 空转 55min；一次 Write “前半部分” → 半份仍超限、
    tool_use 吐一半 agent 进程崩溃。唯一可靠写法（强制）：
    - 第一次 Write 建文件只写第一块，**至多约 150 行**；
    - 之后每次 Edit 向同一文件追加下一块，**每块至多约 150 行**，直到完整；
    - 严禁把整份或半份塞进单次 Write/Edit —— 内容越大越必然被截断或崩溃。
    被禁止的只是“写临时文件再合并”“整份重写多遍”这类重复生成，与小块追加无关。

    ## Decision

    - `done`: 修订记录和完整修订后计划已产出。
    - `blocked`: 缺少关键输入，无法可靠修订。
    - `fail`: 审核意见不可处理或目标已不可执行。
