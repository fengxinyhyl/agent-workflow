skill:
  name: code-implementation
  version: "1"
  description: "编程执行节点规范"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    forbidden_actions:
      - "扩大到计划外重构"
      - "删除用户文件、既有代码库文件或其他节点/轮次的产出（仅允许删除本轮执行过程中产生的临时产物）"
      - "跳过记录实际修改"
      - "在有可执行验证手段却未执行的情况下声称问题已修复"
      - "残留本轮产生的临时产物而直接宣布 done"
  content: |
    # Code Implementation Node

    编程节点按已采纳计划执行代码变更。

    ## 规则

    - 改动范围必须贴合 plan_doc 和 plan_refinement_doc。
    - 发现计划不可执行时输出 `blocked`，不要擅自扩大范围。
    - 记录修改文件、运行命令、偏差、未完成事项。
    - 不覆盖用户未要求修改的工作。

    ## 权限（临时产物）

    - **允许**删除本轮执行过程中产生的临时产物：一次性脚本、以及 `coverage.out`、
      `.pytest_cache`、`bin/`、`build/` 等工具运行生成物（不限于本节点亲手创建的）。
    - **禁止**删除用户文件、既有代码库文件，或其他节点/轮次产出的文件。

    ## 收尾 Contract（作为修订节点复用时强制）

    宣布 `done` 前必须逐项满足并留痕：

    1. 交办的问题均已处理（修复 / 有据延后 / 有据不采纳）。
    2. 每条已采纳修复都已按其 Acceptance 判定；有可执行手段的已执行 Verification 并给出
       PASS/FAIL/NOT_EXECUTED/UNVERIFIABLE 四状态；UNVERIFIABLE 写明原因与剩余风险，不得静默跳过。
    3. 已运行 `git status` 和 `git diff`：status 确认无意外新增/残留文件，
       diff 确认无越界改动、无顺手改坏的 unrelated 文件。
    4. 本轮产生的临时产物已清理，或已显式纳入交付清单说明用途。
