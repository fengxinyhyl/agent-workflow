# Agent 配置
# 真实运行时通过 --agents 显式指定本文件。
# command 中的 {VAR} 占位符从 .env 文件或系统环境变量读取。

agents:
  claude:
    provider: claude
    command: "cc-opus"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write"
    timeout_seconds: 3600
    description: "Claude Opus — 列计划/修订计划/总结"

  deepseek:
    provider: claude
    command: "cc-deepseek"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write,Edit,Bash"
    timeout_seconds: 3600
    description: "Claude DeepSeek — 审核计划/执行任务/修订任务"

  codex:
    provider: codex
    command: "codex"
    cwd: "{project_root}"
    sandbox: workspace-write
    timeout_seconds: 7200
    description: "Codex — 审核结果/校验测试"
