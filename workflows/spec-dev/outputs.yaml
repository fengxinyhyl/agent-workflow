# 产物流配置
# 定义每个 state 的预期产物流名称和类型

outputs:
  plan_doc:
    type: markdown
    description: "开发计划"
    produced_by:
      - planning
      - plan_refinement

  plan_review_doc:
    type: markdown
    description: "计划审核报告"
    produced_by:
      - plan_review

  plan_refinement_doc:
    type: markdown
    description: "计划修订记录"
    produced_by:
      - plan_refinement

  execution_report:
    type: markdown
    description: "执行报告"
    produced_by:
      - execution

  output_review_doc:
    type: markdown
    description: "执行结果审核报告"
    produced_by:
      - output_review

  output_refinement_doc:
    type: markdown
    description: "执行结果修订记录"
    produced_by:
      - output_refinement

  test_report:
    type: markdown
    description: "单元测试报告"
    produced_by:
      - validation

  summary_report:
    type: markdown
    description: "最终总结与复盘"
    produced_by:
      - retrospective
