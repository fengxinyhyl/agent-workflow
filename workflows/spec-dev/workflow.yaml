# spec-dev Workflow
# 需求驱动的开发流程: 列计划 -> 审核计划(2轮) -> 修订计划(2轮) -> 执行任务
#   -> 审核任务(2轮) -> 修订任务(2轮) -> 测试任务 -> 总结
#
# _loops 声明两段独立循环，加载时由 _unroll_single_loop 依次展开:
#
#   planning
#     -> plan_review_r1 -> plan_refinement_r1 -> plan_review_r2 -> plan_refinement_r2
#     -> execution
#     -> output_review_r1 -> output_refinement_r1 -> output_review_r2 -> output_refinement_r2
#     -> validation
#     -> retrospective -> done
#
# 循环机制:
#   - review/refinement 的 done 决策自动重定向：前 N-1 轮 → 下一轮 review；末轮 → on_break
#   - validation revise → output_refinement（展开后 → output_refinement_r1），
#     形成「修订→复审→再修订→再测试」的回流环
#   - guards.max_visits 防止无限循环，超过阈值 → failed
#
# 任务复用:
#   - plan_review / plan_refinement / output_review / output_refinement 各定义一次，
#     通过 :all / :latest 读取历史版本，确保后一轮基于前一轮结论推进

name: spec-dev
version: "1"
description: |
  需求驱动开发工作流: 列计划 -> 审核计划(2轮) -> 修订计划(2轮)
  -> 执行任务 -> 审核任务(2轮) -> 修订任务(2轮) -> 测试任务 -> 总结

initial_state: planning

guards:
  max_visits: 5
  max_duration_minutes: 480
  max_retries: 3
  on_guard_failed: failed

# 两段独立循环，按声明顺序依次展开
_loops:
  - states: [plan_review, plan_refinement]
    repeat: 2
    on_break: execution
  - states: [output_review, output_refinement]
    repeat: 2
    on_break: validation

terminal_states:
  - done
  - failed
  - cancelled

required_skills:
  - agent-workflow-lifecycle

tasks:
  planning:
    instruction: |
      阅读需求文档（goal 中的需求描述及项目上下文），列出完整的开发计划。

      计划必须包含:
      1. 需求理解 — 用自己的话复述需求目标和验收标准，标出歧义点
      2. 目标和非目标 — 明确本次要做与不做的范围
      3. 涉及文件和模块边界 — 列出需新增/修改的文件及理由
      4. 分步骤实现方案 — 每步可独立验证（bite-sized）
      5. 测试策略 — 单元测试覆盖点和验证方式
      6. 风险与停止规则 — 关键风险及何时应停止重试
      7. 预期产物 — 交付物清单

      只列计划，不写实现代码。
    agent: cc-opus
    input:
      - goal
      - project_context
    output: plan_doc
    version_strategy: increment
    skills:
      - dev-plan
    allowed_decisions:
      - done
      - fail
      - blocked

  plan_review:
    instruction: |
      审核当前开发计划。只评价计划本身，不执行代码。

      必须识别:
      - Blocking 问题 — 导致计划不可行的根本缺陷
      - 需求覆盖 — 是否完整覆盖需求文档的全部验收点，有无遗漏或超范围
      - 主要风险 — 技术、依赖、边界条件风险
      - 缺失测试 — 哪些功能点缺少验证手段
      - 可简化点 — 是否存在过度设计

      若已有上一轮的 plan_review_doc 和 plan_refinement_doc，
      必须重点核对上一轮指出的修改方向是否已被充分处理。

      输出 plan_review_doc，使用 done 表示本轮审核完成。
    agent: cc-deepseek
    input:
      - plan_doc:latest
      - plan_doc:all
      - plan_refinement_doc:latest
      - project_context
    output: plan_review_doc
    version_strategy: increment
    skills:
      - dev-review
    allowed_decisions:
      - done
      - fail
      - blocked

  plan_refinement:
    instruction: |
      根据 plan_review_doc 修订开发计划。

      必须逐条回应审核意见:
      - 已采纳 — 说明如何修改
      - 延后处理 — 说明原因和后续计划
      - 不采纳 — 说明理由

      在回应后输出修订版 plan_doc 的关键变更说明（plan_refinement_doc），
      并据此更新 plan_doc。保持计划结构完整。
      使用 done 表示本轮修订完成。
    agent: cc-opus
    input:
      - plan_doc:latest
      - plan_review_doc:latest
      - plan_doc:all
    output: plan_refinement_doc
    version_strategy: increment
    skills:
      - review-adoption
    allowed_decisions:
      - done
      - fail
      - blocked

  execution:
    instruction: |
      按最终版 plan_doc 和历次 plan_refinement_doc 执行代码变更。

      要求:
      1. 严格按计划步骤实现，保持改动范围紧凑，遵守项目现有风格
      2. 不跳过计划中定义的验证步骤
      3. 记录实际修改文件、执行命令、与计划的偏差
      4. 如发现计划在执行中不成立，输出 blocked 并说明阻塞原因

      输出 execution_report 记录上述内容。
    agent: codex
    input:
      - plan_doc:latest
      - plan_refinement_doc:all
      - project_context
    output: execution_report
    skills:
      - code-implementation
    allowed_decisions:
      - done
      - fail
      - blocked

  output_review:
    instruction: |
      审核本次执行结果（代码变更）。重点检查:
      - 是否按计划实现，有无偏离或遗漏
      - 正确性与边界条件
      - 项目风格、安全性、可维护性
      - 需求验收点是否被满足
      - 是否需要补充测试

      若已有上一轮的 output_review_doc 和 output_refinement_doc，
      必须核对上一轮指出的问题是否已被修复。

      输出 output_review_doc，使用 done 表示本轮审核完成。
    agent: cc-deepseek
    input:
      - plan_doc:latest
      - execution_report:latest
      - output_refinement_doc:latest
      - diff
    output: output_review_doc
    version_strategy: increment
    skills:
      - code-audit
    allowed_decisions:
      - done
      - fail
      - blocked

  output_refinement:
    instruction: |
      根据 output_review_doc（或 validation 返回的 test_report）修订代码。

      必须逐条回应审核/测试意见，说明采纳/延后/不采纳及原因，
      然后据此修改代码，保持改动紧凑。

      输出 output_refinement_doc，记录本轮回应、实际修改文件、
      执行命令和验证情况。使用 done 表示本轮修订完成。
    agent: codex
    input:
      - plan_doc:latest
      - execution_report:latest
      - output_review_doc:latest
      - test_report
    output: output_refinement_doc
    version_strategy: increment
    skills:
      - code-implementation
    allowed_decisions:
      - done
      - fail
      - blocked

  validation:
    instruction: |
      验证最终结果是否达标，以单元测试为核心手段。

      要求:
      1. 优先运行项目已有测试命令（参考 CLAUDE.md 中的测试约定）
      2. 必要时为新增功能补充单元测试
      3. 核对需求文档的验收点是否全部通过
      4. 若无法运行测试，必须说明原因和剩余风险

      决策:
      - approve: 测试通过，或无法运行但风险已清楚记录
      - revise: 测试失败，回到修订阶段修复（展开后进入 output_refinement_r1，
        随后自动经过 output_review_r2 → output_refinement_r2 → 再测试）
      - reject: 测试暴露不可接受的问题，终止

      输出 test_report。
    agent: codex
    input:
      - plan_doc:latest
      - execution_report:latest
      - output_refinement_doc:all
    output: test_report
    skills:
      - unit-test
    allowed_decisions:
      - approve
      - revise
      - reject
      - done

  retrospective:
    instruction: |
      生成最终总结与复盘。必须包含:
      1. 完成内容 — 对照需求验收点逐项说明达成情况
      2. 关键决策链路 — 计划与执行中的重要决策及理由
      3. 修改文件和产物流清单
      4. 测试结果
      5. 残余风险和后续建议
      6. 经验沉淀 — 本次流程中值得复用或改进的经验
    agent: cc-opus
    input:
      - plan_doc:all
      - plan_review_doc:all
      - plan_refinement_doc:all
      - execution_report:all
      - output_review_doc:all
      - output_refinement_doc:all
      - test_report
    output: summary_report
    skills:
      - workflow-summary
    allowed_decisions:
      - done
      - fail

# ── states 使用 base 名，_loops 展开时自动生成 _r1/_r2 后缀 ──

states:
  planning:
    task: planning
    on:
      done: plan_review
      fail: failed
      blocked: failed
    default: failed
    description: "阅读需求并列出开发计划"

  # plan 循环: review ↔ refinement
  plan_review:
    task: plan_review
    on:
      done: plan_refinement
      fail: failed
      blocked: failed
    default: failed
    description: "审核开发计划"

  plan_refinement:
    task: plan_refinement
    on:
      done: plan_review
      fail: failed
      blocked: failed
    default: failed
    description: "修订开发计划"

  execution:
    task: execution
    on:
      done: output_review
      fail: failed
      blocked: failed
    default: failed
    description: "按计划执行代码变更"

  # output 循环: review ↔ refinement
  output_review:
    task: output_review
    on:
      done: output_refinement
      fail: failed
      blocked: failed
    default: failed
    description: "审核执行结果"

  output_refinement:
    task: output_refinement
    on:
      done: output_review
      fail: failed
      blocked: failed
    default: failed
    description: "修订执行结果"

  validation:
    task: validation
    on:
      approve: retrospective
      done: retrospective
      revise: output_refinement
      reject: failed
    default: failed
    description: "运行单元测试验证结果"

  retrospective:
    task: retrospective
    on:
      done: done
      fail: failed
    default: failed
    description: "生成总结与复盘"

  done:
    task: ""
    terminal: true
    description: "工作流成功完成"

  failed:
    task: ""
    terminal: true
    description: "工作流失败终止"

  cancelled:
    task: ""
    terminal: true
    description: "工作流被取消"
