# spec-dev Workflow
# 条件回流的需求驱动开发流程:
#   planning -> plan_review
#     approve -> execution
#     revise  -> plan_refinement -> plan_review
#   execution -> output_review
#     approve -> validation
#     revise  -> output_refinement -> output_review
#   validation -> retrospective -> done
#
# 设计要点:
#   - review/test 类节点输出 approve / revise / reject，直接驱动状态机。
#   - 纯执行/修订类节点输出 done / fail / blocked。
#   - guards.max_visits 限制同一 state 的最多进入次数，防止回流失控。
#   - 不使用 _loops 固定双轮，避免小任务被迫多轮审查。

name: spec-dev
version: "1"
description: |
  条件回流的需求驱动开发工作流: 列计划 -> 审核计划 -> 按需修订计划
  -> 执行任务 -> 审核结果 -> 按需修订结果 -> 验证 -> 总结

initial_state: planning

guards:
  max_visits: 3
  max_duration_minutes: 480
  max_retries: 3
  on_guard_failed: failed

terminal_states:
  - done
  - failed
  - cancelled

required_skills:
  - agent-workflow-lifecycle

tasks:
  planning:
    instruction: |
      阅读需求文档（goal 中的需求描述及项目上下文），列出完整的开发计划。

      计划必须包含:
      1. 需求理解 — 用自己的话复述需求目标和验收标准，标出歧义点
      2. 目标和非目标 — 明确本次要做与不做的范围
      3. 涉及文件和模块边界 — 列出需新增/修改的文件及理由
      4. 分步骤实现方案 — 每步可独立验证（bite-sized）
      5. 测试策略 — 单元测试覆盖点和验证方式
      6. 风险与停止规则 — 关键风险及何时应停止重试
      7. 预期产物 — 交付物清单

      只列计划，不写实现代码。
    agent: claude
    input:
      - goal
      - project_context
    output: plan_doc
    version_strategy: increment
    skills:
      - dev-plan
    allowed_decisions:
      - done
      - fail
      - blocked

  plan_review:
    instruction: |
      审核当前开发计划。只评价计划本身，不执行代码。

      必须识别:
      - Blocking 问题 — 导致计划不可行的根本缺陷
      - 需求覆盖 — 是否完整覆盖需求文档的全部验收点，有无遗漏或超范围
      - 主要风险 — 技术、依赖、边界条件风险
      - 缺失测试 — 哪些功能点缺少验证手段
      - 可简化点 — 是否存在过度设计

      若已有上一轮的 plan_review_doc 和 plan_refinement_doc，
      必须重点核对上一轮指出的修改方向是否已被充分处理。

      决策:
      - approve: 计划可执行，可进入 execution
      - revise: 计划存在可修订问题，回到 plan_refinement
      - reject: 计划或目标不可接受，终止

      输出 plan_review_doc，并在 TaskResult decision 中使用 approve / revise / reject。
    agent: deepseek
    input:
      - plan_doc:latest
      - plan_doc:all
      - plan_refinement_doc:latest
      - project_context
    output: plan_review_doc
    version_strategy: increment
    skills:
      - dev-review
    allowed_decisions:
      - approve
      - revise
      - reject
      - fail
      - blocked

  plan_refinement:
    instruction: |
      根据 plan_review_doc 修订开发计划。

      必须逐条回应审核意见:
      - 已采纳 — 说明如何修改
      - 延后处理 — 说明原因和后续计划
      - 不采纳 — 说明理由

      输出 plan_refinement_doc，必须包含:
      1. 每条 review 意见的采纳/延后/不采纳结论
      2. 完整的修订后计划
      3. 相对上一版 plan_doc 的关键变更说明
      后续节点会读取 plan_doc:latest 与 plan_refinement_doc:all，因此本节点不依赖多产物输出。
      使用 done 表示本轮修订完成。
    agent: claude
    input:
      - plan_doc:latest
      - plan_review_doc:latest
      - plan_doc:all
    output: plan_refinement_doc
    version_strategy: increment
    skills:
      - review-adoption
    allowed_decisions:
      - done
      - fail
      - blocked

  execution:
    instruction: |
      按最终版 plan_doc 和历次 plan_refinement_doc 执行代码变更。

      要求:
      1. 严格按计划步骤实现，保持改动范围紧凑，遵守项目现有风格
      2. 不跳过计划中定义的验证步骤
      3. 记录实际修改文件、执行命令、与计划的偏差
      4. 如发现计划在执行中不成立，输出 blocked 并说明阻塞原因

      输出 execution_report 记录上述内容。
    agent: deepseek
    input:
      - plan_doc:latest
      - plan_refinement_doc:all
      - project_context
    output: execution_report
    skills:
      - code-implementation
    allowed_decisions:
      - done
      - fail
      - blocked

  output_review:
    instruction: |
      审核本次执行结果（代码变更）。重点检查:
      - 是否按计划实现，有无偏离或遗漏
      - 正确性与边界条件
      - 项目风格、安全性、可维护性
      - 需求验收点是否被满足
      - 是否需要补充测试
      - 若 diff artifact 不存在，必须读取 execution_report 中列出的文件逐项审查，
        并在 output_review_doc 中标明 diff 缺失带来的残余风险。

      若已有上一轮的 output_review_doc 和 output_refinement_doc，
      必须核对上一轮指出的问题是否已被修复。

      决策:
      - approve: 执行结果可进入 validation
      - revise: 存在可修复问题，回到 output_refinement
      - reject: 变更不可接受，终止

      输出 output_review_doc，并在 TaskResult decision 中使用 approve / revise / reject。
    agent: codex
    input:
      - plan_doc:latest
      - execution_report:latest
      - output_refinement_doc:latest
      - diff
    output: output_review_doc
    version_strategy: increment
    skills:
      - code-audit
    allowed_decisions:
      - approve
      - revise
      - reject
      - fail
      - blocked

  output_refinement:
    instruction: |
      根据 output_review_doc（或 validation 返回的 test_report）修订代码。

      必须逐条回应审核/测试意见，说明采纳/延后/不采纳及原因，
      然后据此修改代码，保持改动紧凑。

      输出 output_refinement_doc，记录本轮回应、实际修改文件、
      执行命令和验证情况。使用 done 表示本轮修订完成。
    agent: deepseek
    input:
      - plan_doc:latest
      - execution_report:latest
      - output_review_doc:latest
      - test_report
    output: output_refinement_doc
    version_strategy: increment
    skills:
      - code-implementation
    allowed_decisions:
      - done
      - fail
      - blocked

  validation:
    instruction: |
      验证最终结果是否达标，以单元测试为核心手段。

      要求:
      1. 优先运行项目已有测试命令（参考 CLAUDE.md 中的测试约定）
      2. 必要时为新增功能补充单元测试
      3. 核对需求文档的验收点是否全部通过
      4. 若无法运行测试，必须说明原因和剩余风险

      决策:
      - approve: 测试通过，或无法运行但风险已清楚记录
      - revise: 测试失败，回到 output_refinement 修复，随后再次经过 output_review 与 validation
      - reject: 测试暴露不可接受的问题，终止

      输出 test_report。
    agent: codex
    input:
      - plan_doc:latest
      - execution_report:latest
      - output_refinement_doc:all
    output: test_report
    skills:
      - unit-test
    allowed_decisions:
      - approve
      - revise
      - reject

  retrospective:
    instruction: |
      生成最终总结与复盘。必须包含:
      1. 完成内容 — 对照需求验收点逐项说明达成情况
      2. 关键决策链路 — 计划与执行中的重要决策及理由
      3. 修改文件和产物流清单
      4. 测试结果
      5. 残余风险和后续建议
      6. 经验沉淀 — 本次流程中值得复用或改进的经验
    agent: claude
    input:
      - plan_doc:all
      - plan_review_doc:all
      - plan_refinement_doc:all
      - execution_report:all
      - output_review_doc:all
      - output_refinement_doc:all
      - test_report
    output: summary_report
    skills:
      - workflow-summary
    allowed_decisions:
      - done
      - fail

# ── states 使用条件回流，不做 _loops 固定展开 ──

states:
  planning:
    task: planning
    on:
      done: plan_review
      fail: failed
      blocked: failed
    default: failed
    description: "阅读需求并列出开发计划"

  # plan 条件回流: review(revise) -> refinement -> review
  plan_review:
    task: plan_review
    on:
      approve: execution
      revise: plan_refinement
      reject: failed
      fail: failed
      blocked: failed
    default: failed
    description: "审核开发计划"

  plan_refinement:
    task: plan_refinement
    on:
      done: plan_review
      fail: failed
      blocked: failed
    default: failed
    description: "修订开发计划"

  execution:
    task: execution
    on:
      done: output_review
      fail: failed
      blocked: failed
    default: failed
    description: "按计划执行代码变更"

  # output 条件回流: review(revise) -> refinement -> review
  output_review:
    task: output_review
    on:
      approve: validation
      revise: output_refinement
      reject: failed
      fail: failed
      blocked: failed
    default: failed
    description: "审核执行结果"

  output_refinement:
    task: output_refinement
    on:
      done: output_review
      fail: failed
      blocked: failed
    default: failed
    description: "修订执行结果"

  validation:
    task: validation
    on:
      approve: retrospective
      revise: output_refinement
      reject: failed
    default: failed
    description: "运行单元测试验证结果"

  retrospective:
    task: retrospective
    on:
      done: done
      fail: failed
    default: failed
    description: "生成总结与复盘"

  done:
    task: ""
    terminal: true
    description: "工作流成功完成"

  failed:
    task: ""
    terminal: true
    description: "工作流失败终止"

  cancelled:
    task: ""
    terminal: true
    description: "工作流被取消"
