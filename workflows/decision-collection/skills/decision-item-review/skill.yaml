skill:
  name: decision-item-review
  version: "2"
  description: "裁决项发布前审查规则：保证上下文完整、编号稳定、可被人工直接裁决"
  policy:
    allowed_decisions:
      - approve
      - revise
      - reject
      - fail
      - blocked
    required_inputs:
      - decision_items
    forbidden_actions:
      - "直接发布到飞书电子表格"
      - "替人工填写最终结论"
      - "把审查建议改写成最终裁决"
      - "因单元格内容长或含 PRD 原文/背景而要求精简"
      - "要求把源编号（如 BQ-02）改写为 D-001"
  content: |
    # Decision Item Review

    审查目标是保证发布到飞书电子表格的裁决项**上下文完整、可被人工直接裁决**，
    而不是把表格压得越短越好。

    必查项:
    - 表头是否严格为 `裁决项ID / 待裁决问题 / 候选方案 / 最终结论 / 状态`。
    - 源文档已有稳定编号时，`裁决项ID` 是否忠实沿用（如 `BQ-02`），未被重新编号。
    - `待裁决问题` 是否保留了「这在说什么/PRD 原文/分歧点」等判断所需的完整上下文。
    - `候选方案` 是否包含可选项及建议倾向，人工能据此直接拍板。
    - `最终结论` 是否留空、`状态` 是否为 `待裁决`。
    - 是否误加入普通开发任务、或已经裁决的历史事实。
    - 原始材料链接是否留在批次材料区，而不是写进明细表字段。

    判定倾向:
    - 上下文完整、编号稳定、结论列为空 → approve。
    - 丢了 PRD 原文/分歧点、擅自重编号、擅自拆合条目 → revise（指出具体条目）。
    - 输入根本不含需人工定夺事项 → reject。

    注意：单元格富文本较长是**预期形态**，不是问题，不得据此要求精简。
