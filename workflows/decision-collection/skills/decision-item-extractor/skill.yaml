skill:
  name: decision-item-extractor
  version: "2"
  description: "把指定 Markdown 中的待裁决事项映射为 5 字段裁决项，保留完整上下文"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    required_inputs:
      - input_inventory
    forbidden_actions:
      - "新增来源位置、类别、裁决人、裁决说明、截止时间或回收校验字段"
      - "把原始 Markdown 链接写入明细表字段"
      - "抽取已明确裁决的历史结论作为新裁决项"
      - "在源文档已有稳定编号时重新编号（如把 BQ-02 改成 D-001）"
      - "把 PRD 原文、分歧点、建议倾向等上下文精简掉或改写"
      - "擅自拆分或合并源文档中的单个裁决条目"
  content: |
    # Decision Item Extractor

    裁决明细表必须严格只有 5 个字段:

    | 裁决项ID | 待裁决问题 | 候选方案 | 最终结论 | 状态 |

    ## 两种输入形态

    ### 形态 A：已成型的裁决清单（优先判断）

    如果输入文档本身已经是逐条列出的待裁决问题、且带稳定编号
    （如 BQ-01 / IQ-03 / OQ-02 / D-001 这类），走**忠实搬运**模式：

    - 一个源条目对应一行，不重新编号、不拆分、不合并。
    - `裁决项ID` 直接沿用源编号（例如 `BQ-02`），不得改成 `D-001`。
    - 单元格允许承载大段富文本；**目标是保留完整上下文，不是压成一行**。

    典型映射（以"人话版"这类结构为例）：

    - `待裁决问题` = 该条的标题 +「这在说什么」(含引用的 PRD 原文) +「分歧点」整段。
    - `候选方案` = 该条的「请你定」选项 +「建议倾向」整段。
    - `最终结论` = 空（人工填写）。
    - `状态` = `待裁决`。

    源文档没有的信息不要编造；源文档字段命名不同时，按"问题主体→待裁决问题、
    可选项/推荐→候选方案"的语义就近归入，并保持原文措辞。

    ### 形态 B：普通文档，需自行识别裁决点

    输入是尚未结构化的文档时，才自行识别需人工定夺的事项并编号 `D-001` 起。

    抽取规则:
    1. 只抽取必须人工定夺、会影响需求/架构/数据字段/验收口径的事项。
    2. 不抽取普通 TODO、实现任务、无争议事实或已明确裁决的历史结论。
    3. 候选方案中可以写"推荐: ..."，但不得新增独立推荐字段。

    ## 字段含义

    - `裁决项ID`: 稳定编号；形态 A 沿用源编号，形态 B 用 `D-001` 起。
    - `待裁决问题`: 问题本身及其必要背景（含 PRD 原文/分歧点），合并在同一单元格。
    - `候选方案`: 可选项与建议倾向；推荐项可写成 `推荐: ...`。
    - `最终结论`: 初始为空，人工填写。
    - `状态`: 初始为 `待裁决`。

    禁止添加 `来源位置`、`类别`、`裁决人` 等额外字段。
    禁止因单元格内容过长而删减 PRD 原文、分歧点或建议倾向。
