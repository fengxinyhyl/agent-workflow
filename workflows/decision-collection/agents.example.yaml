# Agent 配置模板（纳入版本库，命令使用通用默认 claude/codex，开箱即用）。
#
# 引擎实际加载的是同目录的 agents.yaml（已被 .gitignore 忽略、不入库）。
# 首次使用：复制本文件为 agents.yaml，按需把 command 改成个人 wrapper（如 cc-opus/cc-deepseek）：
#     cp agents.example.yaml agents.yaml
# 若不复制，请确保存在 agents.yaml，否则引擎读不到 agent 配置。
#
# 设计原则:
#   - 文档理解/审查/汇总节点: 只读 + Write 写 staging 产物
#   - 飞书发布/回收节点: Codex + workspace-write，用于调用 lark-cli 并写 staging 产物

agents:
  claude:
    provider: claude
    command: "claude"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write,Edit"
    timeout_seconds: 3600
    description: "Claude Opus - 抽取裁决项、生成等待说明和最终裁决包"

  deepseek:
    provider: claude
    command: "claude"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write,Edit"
    timeout_seconds: 3600
    description: "DeepSeek - 审查裁决项质量和字段边界"

  codex:
    provider: codex
    command: "codex"
    cwd: "{project_root}"
    permission_mode: auto
    allowed_tools: "Read,Grep,Glob,Write,Bash"
    sandbox: workspace-write
    timeout_seconds: 7200
    description: "Codex - 校验输入、调用 lark-cli 发布和回收飞书电子表格"
