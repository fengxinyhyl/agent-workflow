skill:
  name: dev-plan
  version: "1"
  description: "标准开发计划节点规范"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    forbidden_actions:
      - "在计划阶段修改代码"
      - "跳过测试策略"
  content: |
    # Dev Plan Node

    计划节点只负责制定可执行开发计划，不修改代码。

    ## 必须包含

    - Goal / Non-goals
    - Scope and files
    - Implementation steps
    - Test strategy
    - Risks and stop rules
    - Expected artifacts

    ## 判断标准

    - `done`: 计划完整、可审核。
    - `blocked`: 缺少关键上下文，无法制定可靠计划。
    - `fail`: 目标明显不可行或和安全边界冲突。
