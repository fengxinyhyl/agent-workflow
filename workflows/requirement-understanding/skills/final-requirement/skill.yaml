skill:
  name: final-requirement
  version: "1"
  description: "最终需求理解产物节点规范"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    forbidden_actions:
      - "替用户裁决未确认分歧"
      - "输出技术路线、架构建议或实现计划"
      - "把最终需求写成 implementation plan"
  content: |
    # Final Requirement Node

    本节点形成最终需求理解产物，可作为 PRD 或后续 spec-dev 输入。

    ## 必须包含

    - Final Requirement Summary
    - 用户目标和业务目标
    - 目标用户/角色
    - 场景、流程和规则
    - 功能需求清单
    - 非目标和范围边界
    - 验收标准
    - 已确认共识
    - 未确认分歧
    - 待用户回答的问题
    - 可交给后续 PRD / spec-dev 的需求输入摘要
    - 原始文档来源：从三份独立理解和 consensus_report 中汇总所有被引用的原始文档。
      必须使用以下格式，列出每份文档的完整相对路径、文档类型和关键内容：

      ```markdown
      ## 原始文档来源

      | 文档路径 | 文档类型 | 关键内容 |
      |----------|----------|----------|
      | docs/requirement/v1.0/需求-01 数据接入管理V1.0.md | 产品需求文档 | 页面结构、字段定义、业务规则、数据口径 |
      ```

      此章节是后续 system-architecture 工作流读取原始文档的唯一入口，
      路径必须准确可访问。
