skill:
  name: requirement-understand
  version: "1"
  description: "独立需求理解节点规范"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    forbidden_actions:
      - "输出技术路线、架构建议或实现计划"
      - "读取其他模型的需求理解产物"
      - "把假设写成已确认事实"
  content: |
    # Requirement Understand Node

    本节点只负责独立理解需求，不做方案设计。

    ## 执行前的必读步骤

    在开始需求理解前，必须先用 Glob 搜索 `docs/requirement/` 目录，
    找到所有需求文档（.md），然后用 Read 逐一阅读。这些文档是需求理解的
    唯一事实来源，不得跳过。

    如果 `docs/requirement/` 目录为空或不存在，必须在产物中明确标注
    "未找到原始需求文档"。

    ## 必须包含

    - 原始需求复述
    - 用户真实目标
    - 目标用户/角色
    - 使用场景和运营流程
    - 需求能力清单
    - 非目标和范围边界
    - 已知约束和假设
    - 缺失信息与原始文档来源
    - 易产生误解的点
    - 可验收的需求表述
    - 原始文档来源：列出本节点实际 Read 的原始文档的完整相对路径（如 docs/requirement/v1.0/xxx.md），
      以及每份文档的关键内容概述

    ## 判断标准

    - `done`: 需求理解完整，可进入交叉审查。
    - `blocked`: 缺少关键上下文，无法可靠理解。
    - `fail`: 需求不可处理或与安全边界冲突。
