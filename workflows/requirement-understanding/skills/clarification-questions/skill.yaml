skill:
  name: clarification-questions
  version: "2"
  description: "需求澄清问题生成节点规范"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    forbidden_actions:
      - "提出方案选择题替代需求澄清"
      - "询问已经在共识报告中确认的问题"
      - "输出技术路线、架构建议或实现计划"
      - "在面向用户的问题正文主句里直接用 equivalent/merge/rename/derived-from/canonical/Coverage/SEM-PROP-* 等引擎术语作为唯一表述（可在括号里附注原始术语，但主句必须是业务语言）"
      - "只甩裸条目编号（R-xx/DR-xx 等）而不展开其业务原文内容"
  content: |
    # Clarification Questions Node

    本节点把分歧和缺失信息转成**业务人能直接读懂、直接拍板**的问题。
    产物的读者是懂业务、不懂引擎内部机制的人，因此正文必须说人话，禁止堆砌引擎黑话。

    ## 问题分层

    - Blocking Questions: 不回答就无法形成最终需求的问题
    - Important Questions: 影响范围、边界、验收标准的问题
    - Optional Questions: 可延后确认的问题

    ## 每个问题的强制结构

    每个问题必须关联具体分歧项或缺失信息，并至少包含以下要素：

    1. **这在说什么**：先用业务语言说明这个问题的背景，并**摊开所有关联条目的业务原文**——
       把 R-xx / DR-xx 编号替换或补充为其 assertions 的实际内容（一句业务描述），
       不能只甩编号让用户自己去查。编号可保留在括号里做定位锚点，但正文必须能脱离编号读懂。
    2. **分歧点 / 缺什么**：三方或审查方在哪里判断不一致，或 PRD 哪里是空白。
    3. **请你定**：给出业务化的可选项（用大白话描述每个选项的业务后果），供用户勾选或补充。
    4. **建议倾向**：可给一个供参考的倾向，但明确最终由用户决定。

    ## 关系类型必须翻译成业务问法

    上游关系类型不得直接抛给用户，必须译成业务语言（原始术语可括号附注）：

    - equivalent → 「这几条是不是在**重复说同一件事**」（是重复就合成一条；不是就各自保留）
    - merge → 「这几条是不是**同一主题的不同部分**（总则+细则+适用范围），该不该组装成一条完整规则」
    - derived-from → 「PRD 没直接写、AI 从多条推理出来的**隐含规则**，这条推理成不成立、算不算正式需求」
    - rename → 「把同一概念的不同叫法**统一改名**成规范名（纯术语统一）」
    - canonical / Coverage 分母 / SEM-PROP-* 等其余引擎概念 → 一律先翻成业务后果再问，禁止裸抛。

    ## 保留的原有约束

    - 不提方案选择题、不给技术路线或实现计划。
    - 不重复询问共识报告里已确认的问题。
    - 严格按 Blocking / Important / Optional 三层组织问题。
