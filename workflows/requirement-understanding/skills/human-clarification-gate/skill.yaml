skill:
  name: human-clarification-gate
  version: "4"
  description: "Single Semantic Authority 节点规范——回答澄清 + 批准 Resolution 提议"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    forbidden_actions:
      - "替用户回答澄清问题"
      - "替用户批准或否决 Resolution 提议"
      - "输出技术路线、架构建议或实现计划"
      - "绕过人工裁决直接继续"
      - "从其他产物中挖掘 clarification_questions 未包含的新问题"
      - "丢弃或跳过 clarification_questions 中的任何问题"
      - "自行修改问题编号、优先级分类或问题实质"
      - "在面向用户的裁决请求正文主句里直接用 equivalent/merge/rename/derived-from/canonical/Coverage/SEM-PROP-* 等引擎术语作为唯一表述（可在括号里附注原始术语，但主句必须是业务语言）"
      - "只甩裸条目编号（R-xx/DR-xx 等）而不展开其业务原文内容"
  content: |
    # Human Semantic Gate Node（Single Semantic Authority）

    本工作流**唯一的人类语义裁决点**。所有确定性步骤（Layer3/Layer4）只消费这里批准的结果，
    不得自行产生新的语义判断。本节点执行完成后由 Runner 暂停，等待 continue 注入 human_clarification。

    产物的读者是懂业务、不懂引擎内部机制的人。呈现必须**业务可读**：说人话、摊开原文、禁堆黑话。

    ## 呈现两件事等待用户

    ### (a) 澄清问题（源自 clarification_questions）

    - `clarification_questions` 是问题的**唯一权威来源**：不新增、不丢弃、不重分类、不改编号、不改问题实质。
    - 保留原始编号（BQ-x / IQ-x / OQ-x）与优先级，回答模板按 BQ/IQ/OQ 排列。
    - 不从 resolution 或其他产物中挖掘未包含的新问题。

    ### (b) Resolution 提议批准（源自 resolution）

    - 呈现被提议合并/归一/派生的条目，配合并证据，请用户审批"这些条目该不该并、这条推理成不成立"。
    - **派生（PRD 没写、AI 推理出来的隐含规则）必须逐条列出请用户单独签字**——只有人能判成立与否。
    - 人审的是 Resolution 提议 + 证据，**不是**逐条审 baseline 全集，**不是**审整份 Requirement。

    ## 业务化翻译呈现（强制）

    若上游 clarification_questions 或 resolution 带有引擎术语或裸条目编号，本节点在
    「可选的展示重组」范围内**必须**把它们翻译成业务语言、并展开条目原文后再呈现：

    - 把 equivalent/merge/derived-from/rename/canonical/Coverage 等术语译成业务问法
      （重复说同一件事 / 同主题不同部分该不该组装 / AI 推理的隐含规则成不成立 / 术语统一改名 等），
      原始术语可在括号里附注。
    - 把 R-xx / DR-xx 裸编号展开为其 assertions 的业务原文，编号仅保留作定位锚点。
    - **翻译呈现 ≠ 改动问题实质**：编号、优先级、问题本身要问什么，一律不动；
      改的只是"用什么语言把它讲给业务人听"。

    ## 产物开头必须包含

    - 一张「术语 → 大白话」对照小表（覆盖本次出现的所有引擎术语）。
    - 一段「为什么要你裁决」的业务化说明：讲清这一步之后全是机器自动执行、只有人能拍板语义判断、
      不定就会卡住或被机器按最宽理解硬合并（用非技术人员能懂的大白话风格，避免引擎黑话）。

    ## 必须包含

    - 说明：不回答 / 不批准的后果
    - 完整问题清单（问题实质原封不动来自 clarification_questions，仅做业务化翻译呈现）
    - 待批准的 Resolution 提议清单（合并/派生优先，配证据）
    - 统一的用户回答与裁决模板
    - 继续流程指引（/req-understand continue <run_id>）

    ## 禁止

    - 新增原问题清单不存在的编号体系
    - 替用户对任何关系拍板
