# requirement-understanding Workflow
# 四层需求规范化链路（Requirement 是 View，不是终点）:
#   Layer1 Build Baseline（best-effort 抽取）-> baseline_requirement_set
#   Layer2 Semantic Resolution（唯一语义层）:
#     多模型独立提议 Resolution -> 异源盲区校验 -> 合并 -> 澄清 -> Human Gate（Single Semantic Authority）
#   Layer3 Canonicalization（确定性）-> Apply(Resolution) 投影出 final_requirement
#   Layer4 Coverage Check（确定性脚本看板）-> 度量 Canonicalization Recall，覆盖缺口标红不阻断
#
# 关键不变量:
#   - 语义先于机械：所有等价/合并/派生判断收进 Layer2 单一裁决点，Layer3/4 只 Apply 不 Reason。
#   - Coverage 只证 Canonicalization Recall（没丢 baseline 已发现的），不证 Extraction Recall（PRD 抽全）。
#   - 本 workflow 不做 advice、不做方案设计、不推荐技术路线、不产 lineage（lineage 从架构跳开始）。

name: requirement-understanding
version: "2"
description: |
  四层需求规范化工作流。Build Baseline -> 多模型 Semantic Resolution 提议 -> 异源校验 ->
  合并 -> Human Gate 批准 Resolution -> Apply(Resolution) 产出 Canonical Requirement ->
  Coverage Check 证明 Canonicalization Recall。产物不含方案建议、不产 lineage。

initial_state: build_baseline

guards:
  max_visits: 2
  # 含人工语义裁决 gate（human_semantic_gate），墙钟时长受人工裁决/澄清耗时影响不可控，
  # 设为 0 表示不限制总时长，避免 continue 恢复时被时长 guard 误判 failed。
  max_duration_minutes: 0
  max_retries: 2
  on_guard_failed: failed

terminal_states:
  - done
  - failed
  - cancelled

required_skills:
  - agent-workflow-lifecycle

tasks:
  build_baseline:
    instruction: |
      Layer1 Build Baseline：best-effort 抽取需求条目全集，产出 baseline_requirement_set。
      这是 Canonicalization Recall 的分母，不是 Ground Truth——它只保证下游 Layer3 不丢
      本层已发现的项，不声称抽全了 PRD。

      异源要求（硬约束）：本节点必须与 Layer2 语义节点异源（不同 pass/独立视角），
      使 Baseline 成为对 Canonicalization 的独立见证——若与 Layer2 共享盲点会造成虚假 100%。

      v1.1 无结构化字段源：需求实体（主小区/识别结果/治理任务/策略/审计等）散落在 PRD 叙述
      章节，必须 LLM 抽取。不读 v1.0 表结构 HTML、不做基数假设。

      产物必须包含供 coverage_check 机读的 fenced block（语言标 `coverage baseline`）：
      每个 baseline 项一条，含 id（唯一）、可选 token（源词，供 Resolution 连通）、
      可选 assertions（该项的最细断言列表，粒度下沉到字段/规则的每条约束）。
      正文另附人类可读的条目说明与原始文档来源。

      只做抽取，不做等价判断、不做合并、不输出 advice/方案/技术路线。
    agent: deepseek
    input:
      - goal
      - project_context
    output: baseline_requirement_set
    skills:
      - build-baseline
    allowed_decisions:
      - done
      - fail
      - blocked

  resolve_deepseek:
    instruction: |
      Layer2 Semantic Resolution（独立提议）：基于 baseline_requirement_set 提议语义等价关系。
      不是"需求理解摘要"，而是各自独立提出 Resolution：术语同义、重复实体、可合并规则、
      派生规则（derived-from）。分歧将作为 Fidelity 高风险点标红，不追求一致。

      禁止直接产出 canonical 结果（那是 Layer3 的确定性 Apply）；只提议"哪些是同一对象/可合并/派生"，
      并为每条提议附 Evidence（源自哪些 baseline 项）。不输出 advice/方案/技术路线。
    agent: deepseek
    input:
      - goal
      - project_context
      - baseline_requirement_set
    output: resolution_proposal_deepseek
    skills:
      - semantic-resolution
    allowed_decisions:
      - done
      - fail
      - blocked

  resolve_claude:
    instruction: |
      Layer2 Semantic Resolution（独立提议）：基于 baseline_requirement_set 提议语义等价关系。
      不读取其他模型的提议。术语同义/重复实体/可合并规则/派生规则各自提出，附 Evidence。
      分歧作 Fidelity 风险探针。不输出 advice/方案/技术路线。
    agent: claude
    input:
      - goal
      - project_context
      - baseline_requirement_set
    output: resolution_proposal_claude
    skills:
      - semantic-resolution
    allowed_decisions:
      - done
      - fail
      - blocked

  resolve_codex:
    instruction: |
      Layer2 Semantic Resolution（独立提议）：基于 baseline_requirement_set 提议语义等价关系。
      不读取其他模型的提议。术语同义/重复实体/可合并规则/派生规则各自提出，附 Evidence。
      分歧作 Fidelity 风险探针。不输出 advice/方案/技术路线。
    agent: codex
    input:
      - goal
      - project_context
      - baseline_requirement_set
    output: resolution_proposal_codex
    skills:
      - semantic-resolution
    allowed_decisions:
      - done
      - fail
      - blocked

  review_by_claude:
    instruction: |
      Layer2 异源盲区校验：审查 resolution_proposal_deepseek，并对照 baseline_requirement_set
      检查 Resolution 提议是否有盲区。目标不是"提高理解质量"，而是使多源提议相互成为独立见证。

      只做等价/合并/派生提议的盲区与一致性检查:
      1. 是否有 baseline 项在提议里被漏掉（未纳入任何等价/合并/派生判断）
      2. 是否有合错（把非同一对象判为等价）或碎裂（同一对象未归并）
      3. derived-from 派生提议是否成立、是否附了 Evidence
      4. 与本模型独立视角相比，提议存在哪些分歧（标红作 Fidelity 风险）
      禁止输出 advice、方案建议、技术路线、架构建议或实现计划。
    agent: claude
    input:
      - goal
      - project_context
      - baseline_requirement_set
      - resolution_proposal_deepseek
    output: review_claude
    skills:
      - requirement-gap-review
    allowed_decisions:
      - done
      - fail
      - blocked

  review_by_codex:
    instruction: |
      Layer2 异源盲区校验：审查 resolution_proposal_claude，对照 baseline_requirement_set
      检查 Resolution 提议盲区（漏项/合错/碎裂/派生是否成立），标红分歧作 Fidelity 风险。
      禁止输出 advice、方案建议、技术路线、架构建议或实现计划。
    agent: codex
    input:
      - goal
      - project_context
      - baseline_requirement_set
      - resolution_proposal_claude
    output: review_codex
    skills:
      - requirement-gap-review
    allowed_decisions:
      - done
      - fail
      - blocked

  review_by_deepseek:
    instruction: |
      Layer2 异源盲区校验：审查 resolution_proposal_codex，对照 baseline_requirement_set
      检查 Resolution 提议盲区（漏项/合错/碎裂/派生是否成立），标红分歧作 Fidelity 风险。
      禁止输出 advice、方案建议、技术路线、架构建议或实现计划。
    agent: deepseek
    input:
      - goal
      - project_context
      - baseline_requirement_set
      - resolution_proposal_codex
    output: review_deepseek
    skills:
      - requirement-gap-review
    allowed_decisions:
      - done
      - fail
      - blocked

  combine_resolution:
    instruction: |
      读取三份 Resolution 提议和三份异源盲区校验，合并成一份待批准的 Resolution。
      这是 Layer2 的核心资产，coverage_check（Layer4）与 canonicalize（Layer3）都以它为唯一输入。

      合并是"汇总提议 + 标注分歧"，不是"投票定论"：consensus_score 已降级，不再是通过依据；
      通过依据是 Coverage 无未追溯项 + Human Gate 批准。禁止用多数票覆盖分歧、禁止自行拍板。

      必须包含:
      1. 供机读的 fenced block（语言标 `coverage resolution`）：每条关系一项，含
         type（equivalent/merge/rename/derived-from）、from（源 baseline id 集合）、to（目标 canonical id）。
      2. Agreed Relations: 三方一致或高度一致的等价/合并/派生关系
      3. Divergent Relations: 三方提议不一致的关系（Fidelity 高风险，标红）
      4. Derived Relations: derived-from 派生关系（Coverage 分母外，必须单独列出待人审签字）
      5. Merge Evidence: 每条合并/归一/派生附 `Source: <baseline ids> → <canonical id>` 证据
      6. Human Decision Needed: 必须由用户裁决的关系
      禁止输出 advice、方案建议、技术路线、架构建议或实现计划。
    agent: codex
    input:
      - baseline_requirement_set
      - resolution_proposal_deepseek
      - resolution_proposal_claude
      - resolution_proposal_codex
      - review_claude
      - review_codex
      - review_deepseek
    output: resolution
    skills:
      - requirement-consensus
    allowed_decisions:
      - done
      - fail
      - blocked

  generate_clarification_questions:
    instruction: |
      基于 resolution 的分歧关系与 baseline 缺口生成给用户回答的澄清问题。

      问题必须用于收敛 Resolution（哪些等价/合并/派生成立），不得引入方案建议或技术路线。

      必须包含:
      1. Blocking Questions: 不回答就无法批准 Resolution 的问题（含派生关系是否成立）
      2. Important Questions: 影响范围、边界、验收标准、合并/归一是否正确的问题
      3. Optional Questions: 可延后确认的问题
      4. 每个问题关联的 Divergent/Derived Relation 或 baseline 缺口
      5. 建议的回答格式
    agent: claude
    input:
      - resolution
      - baseline_requirement_set
      - project_context
    output: clarification_questions
    skills:
      - clarification-questions
    allowed_decisions:
      - done
      - fail
      - blocked

  human_semantic_gate:
    instruction: |
      本节点是 Single Semantic Authority——本工作流唯一的人类语义裁决点。它做两件事：
      (a) 呈现 clarification_questions 等待用户回答；
      (b) 呈现 resolution 的提议（尤其 Divergent Relations 与 Derived Relations）+ Merge Evidence，
          请用户审批"被提议合并/归一/派生的条目对不对"。

      本节点执行完成后由 Runner 暂停，等待外部通过 continue 命令注入 human_clarification
      （含澄清回答 + 对 Resolution 提议的裁决）。禁止替用户回答、禁止替用户批准 Resolution、
      禁止输出 advice、方案建议、技术路线、架构建议或实现计划。

      核心约束:
      1. clarification_questions 是问题的唯一权威来源，不新增、不丢弃、不重分类
      2. 保留原始编号（BQ-x / IQ-x / OQ-x）和优先级，不自行创建新编号体系
      3. derived-from 派生关系【必须】逐条列出请用户单独签字——Coverage 兜不住派生节点，只有人能判
      4. 人审的是 Resolution 提议 + Evidence，不是逐条审 baseline 全集、不是审整份 Requirement

      必须包含:
      1. 说明：不回答/不批准的后果
      2. 完整的问题清单（原封不动来自 clarification_questions）
      3. 待批准的 Resolution 提议清单（Divergent + Derived 优先，配 Source→Merged Evidence）
      4. 统一的用户回答与裁决模板
      5. 继续流程指引（/req-understand continue <run_id>）
    agent: claude
    input:
      - clarification_questions
      - resolution
      - baseline_requirement_set
    output: human_clarification_request
    skills:
      - human-clarification-gate
    allowed_decisions:
      - done
      - fail
      - blocked

  canonicalize:
    instruction: |
      Layer3 Canonicalization（确定性）：拿【已被 Human Gate 批准的】resolution 对
      baseline_requirement_set 做 Apply(Resolution)，投影出 Canonical Requirement。
      这是机械层——只 Apply 不 Reason：rename/dedupe/reference/分配新编号，没有自由度。
      不得在此引入新的语义判断（新的等价/合并/派生）；若发现遗漏关系，应回到 Layer2 而非私自决定。

      human_clarification 中用户已批准/否决的 Resolution 提议为准；缺少用户裁决的关系
      保留为待确认，不替用户拍板。禁止输出 advice、方案建议、技术路线、架构建议或实现计划。

      必须包含:
      1. 供机读的 fenced block（语言标 `coverage canonical`）：每个 canonical 项一条，
         含 id 与 assertions（保留 baseline 项下沉的每条约束，供覆盖粒度校验）。
      2. 用户目标和业务目标
      3. 目标用户/角色
      4. 场景、流程和规则（按机器消费组织：实体/规则/约束/AC/术语/开放决策）
      5. 功能需求清单（Canonical 实体与规则，含 ID）
      6. 非目标和范围边界
      7. 验收标准
      8. 已确认关系 / 未确认分歧 / 待用户回答的问题
      9. Evidence Index：每个 canonical 项回指 baseline 源项与 Resolution 关系（sources 指针）
      10. 【剥离实现进度】：不含勾选/🟡/🟠/「待 Mxx」等进度标记——SoT 只讲系统该怎样，不讲做到哪了
    agent: claude
    input:
      - baseline_requirement_set
      - resolution
      - clarification_questions
      - human_clarification
    output: final_requirement
    skills:
      - final-requirement
    allowed_decisions:
      - done
      - fail
      - blocked

  coverage_check:
    instruction: |
      Layer4 Coverage Check：确定性脚本看板（provider: command），度量 Canonicalization Recall
      ——final_requirement 是否丢掉 baseline_requirement_set 已发现的项。经 Resolution 解析后比对，
      未追溯的 baseline 项与断言蒸发只标红进 coverage_report、供人工裁量，不阻断（退出码 0）。
      仅产物缺失/机读块缺失等硬错误才退出码 1 使工作流失败。
      本节点不经 LLM 判断覆盖率（会与 Layer2 盲点重合造成虚假 100%）。
    agent: coverage_check
    input:
      - baseline_requirement_set
      - resolution
      - final_requirement
    output: coverage_report
    allowed_decisions:
      - done
      - fail

states:
  build_baseline:
    task: build_baseline
    on:
      done: resolve_deepseek
      fail: failed
      blocked: failed
    default: failed
    description: "Layer1 抽取 baseline_requirement_set（异源，非 Ground Truth）"

  resolve_deepseek:
    task: resolve_deepseek
    on:
      done: resolve_claude
      fail: failed
      blocked: failed
    default: failed
    description: "DeepSeek 独立提议 Resolution"

  resolve_claude:
    task: resolve_claude
    on:
      done: resolve_codex
      fail: failed
      blocked: failed
    default: failed
    description: "Claude 独立提议 Resolution"

  resolve_codex:
    task: resolve_codex
    on:
      done: review_by_claude
      fail: failed
      blocked: failed
    default: failed
    description: "Codex 独立提议 Resolution"

  review_by_claude:
    task: review_by_claude
    on:
      done: review_by_codex
      fail: failed
      blocked: failed
    default: failed
    description: "Claude 异源盲区校验 DeepSeek 的 Resolution 提议"

  review_by_codex:
    task: review_by_codex
    on:
      done: review_by_deepseek
      fail: failed
      blocked: failed
    default: failed
    description: "Codex 异源盲区校验 Claude 的 Resolution 提议"

  review_by_deepseek:
    task: review_by_deepseek
    on:
      done: combine_resolution
      fail: failed
      blocked: failed
    default: failed
    description: "DeepSeek 异源盲区校验 Codex 的 Resolution 提议"

  combine_resolution:
    task: combine_resolution
    on:
      done: generate_clarification_questions
      fail: failed
      blocked: failed
    default: failed
    description: "合并三方 Resolution 提议为待批准 Resolution（唯一核心资产）"

  generate_clarification_questions:
    task: generate_clarification_questions
    on:
      done: human_semantic_gate
      fail: failed
      blocked: failed
    default: failed
    description: "由 Resolution 分歧与 baseline 缺口生成澄清问题"

  human_semantic_gate:
    task: human_semantic_gate
    on:
      approve: canonicalize
      reject: failed
    default: failed
    gate: true
    description: "Single Semantic Authority：批准 Resolution + 回答澄清（派生关系强制签字）"

  canonicalize:
    task: canonicalize
    on:
      done: coverage_check
      fail: failed
      blocked: failed
    default: failed
    description: "Layer3 Apply(Resolution) 投影出 Canonical Requirement"

  coverage_check:
    task: coverage_check
    on:
      done: done
      fail: failed
    default: failed
    description: "Layer4 脚本看板：度量 Canonicalization Recall，覆盖缺口标红不阻断，仅硬错误退出码 1"

  done:
    task: ""
    terminal: true
    description: "工作流成功完成"

  failed:
    task: ""
    terminal: true
    description: "工作流失败终止"

  cancelled:
    task: ""
    terminal: true
    description: "工作流被取消"
