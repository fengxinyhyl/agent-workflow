# software-dev Workflow
# v4 P0 示例: Plan → Review → Revise → Execute → Audit → Summary
#
# 核心链路:
#   plan → review_plan
#     approve → execute
#     revise  → revise_plan → review_plan
#     reject  → failed
#   execute → audit
#     approve → summary
#     revise  → revise_execute → audit
#     reject  → failed
#   summary → done

name: software-dev
version: "1"
description: |
  Plan → Review → Revise → Execute → Audit → Summary

initial_state: plan

guards:
  max_visits: 5
  max_duration_minutes: 480
  max_retries: 3
  on_guard_failed: failed

terminal_states:
  - done
  - failed
  - cancelled

required_skills:
  - agent-workflow-lifecycle

tasks:
  plan:
    instruction: |
      根据 goal 编写实现计划。计划必须包含:
      1. 实现步骤（bite-sized 为佳）
      2. 涉及的文件列表
      3. 测试策略
      4. 风险点
      5. 停止规则
    agent: cc-opus
    input:
      - goal
      - project_context
    output: plan_doc
    allowed_decisions:
      - done
      - fail
      - blocked

  review_plan:
    instruction: |
      审查实现计划。从以下维度评估:
      1. 完整性 — 是否覆盖所有功能点
      2. 正确性 — 技术方案是否可行
      3. 测试覆盖 — 是否定义了足够的测试
      4. 风险 — 是否识别了关键风险
      5. 复杂度 — 是否可以简化

      输出 approve（可以执行）、revise（需要修改）或 reject（不可行）。
    agent: cc-deepseek
    input:
      - plan_doc
      - project_context
    output: review_doc
    allowed_decisions:
      - approve
      - revise
      - reject

  revise_plan:
    instruction: |
      根据审查意见修改实现计划。必须逐条回应审查意见，
      说明哪些采纳、哪些不采纳及原因。
    agent: cc-opus
    input:
      - plan_doc
      - review_doc
      - revision_instructions
    output: plan_doc
    allowed_decisions:
      - done
      - fail
      - blocked

  execute:
    instruction: |
      按照已批准的实现计划执行代码变更。
      严格按照计划步骤进行，不要跳过验证步骤。
      如果计划在执行中发现问题，输出 blocked 并说明原因。
    agent: codex
    input:
      - plan_doc
      - project_context
    output: execution_report
    allowed_decisions:
      - done
      - fail
      - blocked

  audit:
    instruction: |
      审计代码变更。检查:
      1. 是否按照计划执行
      2. 代码质量和风格
      3. 测试通过
      4. 无安全/性能问题
      5. 边界情况覆盖

      输出 approve（通过）、revise（需要修改）或 reject（不可接受）。
    agent: cc-deepseek
    input:
      - plan_doc
      - execution_report
      - diff
    output: audit_report
    allowed_decisions:
      - approve
      - revise
      - reject

  revise_execute:
    instruction: |
      根据审计意见修改代码。必须逐条回应审计意见。
    agent: codex
    input:
      - plan_doc
      - execution_report
      - audit_report
      - revision_instructions
    output: execution_report
    allowed_decisions:
      - done
      - fail
      - blocked

  summary:
    instruction: |
      生成工作流总结报告。包含:
      1. 执行摘要
      2. 关键决策
      3. 产物流清单
      4. 待办事项
    agent: cc-opus
    input:
      - plan_doc
      - execution_report
      - audit_report
    output: summary_report
    allowed_decisions:
      - done
      - fail

states:
  plan:
    task: plan
    on:
      done: review_plan
      fail: failed
      blocked: failed
    default: failed
    description: "编写实现计划"

  review_plan:
    task: review_plan
    on:
      approve: execute
      revise: revise_plan
      reject: failed
    default: failed
    description: "审查实现计划"

  revise_plan:
    task: revise_plan
    on:
      done: review_plan
      fail: failed
      blocked: failed
    default: failed
    description: "根据审查意见修改计划"

  execute:
    task: execute
    on:
      done: audit
      fail: failed
      blocked: audit
    default: failed
    description: "执行代码变更"

  audit:
    task: audit
    on:
      approve: summary
      revise: revise_execute
      reject: failed
    default: failed
    description: "审计代码变更"

  revise_execute:
    task: revise_execute
    on:
      done: audit
      fail: failed
      blocked: failed
    default: failed
    description: "根据审计意见修改代码"

  summary:
    task: summary
    on:
      done: done
      fail: failed
    default: failed
    description: "生成工作流总结报告"

  done:
    task: ""
    terminal: true
    description: "工作流成功完成"

  failed:
    task: ""
    terminal: true
    description: "工作流失败终止"

  cancelled:
    task: ""
    terminal: true
    description: "工作流被取消"
