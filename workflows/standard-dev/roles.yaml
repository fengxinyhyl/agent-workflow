# Role 配置

roles:
  planner:
    agent: codex_plan
    fallback_agents:
      - claude_review
    description: "开发计划编写"

  reviewer:
    agent: claude_review
    fallback_agents:
      - codex_plan
    description: "计划审核"

  advisor:
    agent: claude_review
    fallback_agents:
      - codex_plan
    description: "审核意见采纳"

  executor:
    agent: codex_execute
    fallback_agents:
      - codex_plan
    description: "代码编程"

  auditor:
    agent: claude_audit
    fallback_agents:
      - claude_review
    description: "代码检查"

  tester:
    agent: codex_execute
    fallback_agents:
      - claude_audit
    description: "单元测试"

  summarizer:
    agent: codex_plan
    fallback_agents:
      - claude_review
    description: "最终总结"
