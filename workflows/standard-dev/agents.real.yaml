# Agent 配置
# 真实运行时通过 --agents 显式指定本文件。
# 默认 mock 跑通时不自动发现本文件，Runner 会 fallback 到 MockAgent。

agents:
  codex_plan:
    provider: codex
    command: "{CODEX_COMMAND}"
    cwd: "{project_root}"
    sandbox: workspace-write
    timeout_seconds: 3600
    description: "Codex — 开发计划/总结"

  claude_review:
    provider: claude
    command: "{CLAUDE_COMMAND}"
    cwd: "{project_root}"
    timeout_seconds: 3600
    description: "Claude — 审核与采纳"

  codex_execute:
    provider: codex
    command: "{CODEX_COMMAND}"
    cwd: "{project_root}"
    sandbox: workspace-write
    timeout_seconds: 7200
    description: "Codex — 编程和测试执行"

  claude_audit:
    provider: claude
    command: "{CLAUDE_COMMAND}"
    cwd: "{project_root}"
    timeout_seconds: 3600
    description: "Claude — 代码检查"
