# standard-dev Workflow
# 标准开发链路: 计划 -> 审核 -> 采纳 -> 编程 -> 检查代码 -> 单元测试 -> 总结
#
# 核心链路:
#   plan -> review -> adoption
#     approve -> implement -> code_audit -> unit_test -> summary -> done
#     revise  -> plan
#     reject  -> failed
#   code_audit revise -> implement
#   unit_test revise -> implement

name: standard-dev
version: "1"
description: |
  标准软件开发工作流: 计划 -> 审核 -> 采纳 -> 编程 -> 检查代码 -> 单元测试 -> 总结

initial_state: plan

guards:
  max_visits: 5
  max_duration_minutes: 480
  max_retries: 3
  on_guard_failed: failed

terminal_states:
  - done
  - failed
  - cancelled

required_skills:
  - agent-workflow-lifecycle

tasks:
  plan:
    instruction: |
      根据 goal 编写开发计划。若已有 adoption_doc、audit_report 或 test_report，
      必须逐条回应其中的 blocking 问题并更新计划。

      计划必须包含:
      1. 目标和非目标
      2. 涉及文件和模块边界
      3. 分步骤实现方案
      4. 测试策略
      5. 风险和停止规则
      6. 预期产物
    role: planner
    input:
      - goal
      - project_context
      - adoption_doc
      - audit_report
      - test_report
    output: plan_doc
    skills:
      - dev-plan
    allowed_decisions:
      - done
      - fail
      - blocked

  review:
    instruction: |
      审核 plan_doc。只评价计划，不执行代码。
      必须识别 blocking 问题、主要风险、缺失测试和可简化点。
      输出 review_doc，并使用 done 表示审核完成。
    role: reviewer
    input:
      - plan_doc
      - project_context
    output: review_doc
    skills:
      - dev-review
    allowed_decisions:
      - done
      - fail
      - blocked

  adoption:
    instruction: |
      根据 review_doc 决定是否采纳计划。
      必须逐条列出审核意见的处理结果:
      - 已采纳
      - 延后处理
      - 不采纳及原因

      决策:
      - approve: 计划可以进入编程
      - revise: 计划需要回到 plan 重写
      - reject: 目标或方案不可行，终止
    role: advisor
    input:
      - plan_doc
      - review_doc
    output: adoption_doc
    skills:
      - review-adoption
    allowed_decisions:
      - approve
      - revise
      - reject

  implement:
    instruction: |
      按已采纳的 plan_doc 和 adoption_doc 执行代码变更。
      必须保持改动范围紧凑，遵守项目现有风格。
      如发现计划不成立，输出 blocked 并说明阻塞原因。
      输出 implementation_report，记录实际修改、命令、偏差和验证情况。
    role: executor
    input:
      - plan_doc
      - adoption_doc
      - project_context
    output: implementation_report
    skills:
      - code-implementation
    allowed_decisions:
      - done
      - fail
      - blocked

  code_audit:
    instruction: |
      检查代码变更。重点检查正确性、边界条件、项目风格、安全性、
      可维护性、是否偏离计划，以及是否需要补充测试。

      决策:
      - approve: 可进入单元测试
      - revise: 需要回到 implement 修复
      - reject: 变更不可接受，终止
    role: auditor
    input:
      - plan_doc
      - adoption_doc
      - implementation_report
      - diff
    output: code_audit_report
    skills:
      - code-audit
    allowed_decisions:
      - approve
      - revise
      - reject

  unit_test:
    instruction: |
      根据 plan_doc、implementation_report 和 code_audit_report 运行或设计单元测试。
      优先运行项目已有测试命令；如无法运行，必须说明原因和剩余风险。

      决策:
      - approve: 测试通过或无法运行但风险已清楚记录
      - revise: 测试失败且需要回到 implement 修复
      - reject: 测试暴露不可接受问题，终止
    role: tester
    input:
      - plan_doc
      - implementation_report
      - code_audit_report
    output: test_report
    skills:
      - unit-test
    allowed_decisions:
      - approve
      - revise
      - reject

  summary:
    instruction: |
      生成最终总结。必须包含:
      1. 完成内容
      2. 关键决策
      3. 修改文件和产物流清单
      4. 测试结果
      5. 残余风险和后续建议
    role: summarizer
    input:
      - plan_doc
      - adoption_doc
      - implementation_report
      - code_audit_report
      - test_report
    output: summary_report
    skills:
      - workflow-summary
    allowed_decisions:
      - done
      - fail

states:
  plan:
    task: plan
    on:
      done: review
      fail: failed
      blocked: failed
    default: failed
    description: "编写或修订开发计划"

  review:
    task: review
    on:
      done: adoption
      fail: failed
      blocked: failed
    default: failed
    description: "审核开发计划"

  adoption:
    task: adoption
    on:
      approve: implement
      revise: plan
      reject: failed
    default: failed
    description: "采纳审核意见并决定是否进入编程"

  implement:
    task: implement
    on:
      done: code_audit
      fail: failed
      blocked: failed
    default: failed
    description: "执行代码变更"

  code_audit:
    task: code_audit
    on:
      approve: unit_test
      revise: implement
      reject: failed
    default: failed
    description: "检查代码变更"

  unit_test:
    task: unit_test
    on:
      approve: summary
      revise: implement
      reject: failed
    default: failed
    description: "运行或设计单元测试"

  summary:
    task: summary
    on:
      done: done
      fail: failed
    default: failed
    description: "生成最终总结"

  done:
    task: ""
    terminal: true
    description: "工作流成功完成"

  failed:
    task: ""
    terminal: true
    description: "工作流失败终止"

  cancelled:
    task: ""
    terminal: true
    description: "工作流被取消"
