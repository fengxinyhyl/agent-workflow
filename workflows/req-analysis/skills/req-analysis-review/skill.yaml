skill:
  name: req-analysis-review
  version: "1"
  description: "需求拆分审查节点规范"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    forbidden_actions:
      - "在审查阶段重写需求拆分文档"
      - "直接进入实现建议"
      - "忽略不可验收的 Step"
  content: |
    # Req Analysis Review Node

    本节点只审查需求理解和子需求拆分质量，不执行代码，也不重写 plan。

    ## 审查维度

    - 原始需求是否准确复述
    - 目标与非目标是否清楚
    - Step 是否完整覆盖需求
    - 每个 Step 是否可独立验收
    - Step 顺序和依赖是否合理
    - 是否存在遗漏、过度拆分、范围蔓延或不可验证项

    ## 输出要求

    必须包含:

    - Review verdict: `approve` / `advise` / `reject`
    - Blocking issues
    - Major risks
    - Missing information
    - Suggested changes
    - Do-not-change constraints

    ## 判断标准

    - `done`: 审查完成，后续 advice 节点可以形成最终建议。
    - `blocked`: 输入不足，无法审查。
    - `fail`: 拆分文档无法审查或严重偏离需求。
