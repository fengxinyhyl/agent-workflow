skill:
  name: req-analysis-plan
  version: "1"
  description: "需求理解与子需求拆分节点规范"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    forbidden_actions:
      - "在需求拆分阶段修改代码"
      - "把子需求写成无法验收的抽象口号"
      - "省略 Step 编号"
  content: |
    # Req Analysis Plan Node

    本节点负责理解用户需求，并拆分成可审查、可排序、可验收的子需求。

    ## 必须包含

    - 原始需求复述
    - 目标与非目标
    - 已知约束与假设
    - 待确认问题
    - 子需求拆分，必须使用 `Step 1`、`Step 2`、`Step 3`、`Step 4`... 编号
    - 每个 Step 的验收标准
    - 依赖关系和推荐执行顺序
    - 风险与停止规则

    ## Step 要求

    每个 Step 应当只表达一个可独立判断完成与否的子需求。若一个 Step 同时包含多个目标，应继续拆分。

    ## 判断标准

    - `done`: 需求理解清楚，Step 拆分完整且可审查。
    - `blocked`: 缺少关键上下文，无法可靠拆分。
    - `fail`: 需求不可执行或与安全边界冲突。
