# Agent 配置
# command 中的 {VAR} 占位符从 .env 文件或系统环境变量读取。
#
# req-analysis 工作流只需要两个 Agent:
#   - cc-opus:     需求理解与最终建议（只读 + Write 写产物）
#   - cc-deepseek: 需求拆分审查（只读 + Write 写产物）

agents:
  cc-opus:
    provider: claude
    command: "{OPUS_COMMAND}"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write"
    timeout_seconds: 3600
    description: "Claude Opus — 需求理解与最终建议"

  cc-deepseek:
    provider: claude
    command: "{DEEPSEEK_COMMAND}"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write"
    timeout_seconds: 3600
    description: "Claude DeepSeek — 需求拆分审查"
