outputs:
  project_analysis:
    type: markdown
    description: "原始产品需求摘要、已确定技术栈、现有数据模型/API/页面分析和差距分析"
    produced_by:
      - gather_context

  architecture_drivers:
    type: markdown
    description: "业务目标、技术目标、关键用例、数据/集成驱动因素和显式化隐含假设"
    produced_by:
      - extract_drivers

  constraints_objectives:
    type: markdown
    description: "hard constraints、soft constraints、optimization function、验证方式和审批要求"
    produced_by:
      - structure_constraints_objectives

  architecture_draft:
    type: markdown
    description: "逐条对齐 driver 和 constraint 的系统架构草案"
    produced_by:
      - draft_architecture

  evaluation_report:
    type: markdown
    description: "Evaluation Gate 评分矩阵、blocker list、violation list 和 trade-off conflict list"
    produced_by:
      - evaluation_gate

  architecture_review:
    type: markdown
    description: "Human Gate 架构方案审查意见——六维语义审查结论、修订建议和人工裁决文件模板"
    produced_by:
      - architecture_review

  conflict_revision_doc:
    type: markdown
    description: "基于 violation / conflict 的修订策略、完整修订后架构和约束放宽审批请求"
    produced_by:
      - conflict_revision

  final_architecture:
    type: markdown
    description: "Architecture Freeze + ADR，包含最终架构、追踪矩阵、评分摘要和 ADR 记录"
    produced_by:
      - architecture_freeze

  verdict_consistency_report:
    type: markdown
    description: "Verdict 一致性确定性门报告：核对 freeze restatement 忠实回指 eval verdict；极性翻转/漏回指则退出码 1 工作流失败"
    produced_by:
      - verdict_consistency_check

  data_model:
    type: markdown
    description: "确定性数据模型 DDL——实体关系图、新表 DDL、变更表 migration、索引设计和数据迁移说明"
    produced_by:
      - data_model

  ddl_conflict_report:
    type: markdown
    description: "DDL 冲突确定性门报告：新建表名撞库/migration 编号撞号检测；存在冲突则退出码 1 工作流失败"
    produced_by:
      - ddl_conflict_check
