# Agent 配置
# command 中的 {VAR} 占位符从 .env 文件或系统环境变量读取。

agents:
  cc-opus:
    provider: claude
    command: "{OPUS_COMMAND}"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write"
    timeout_seconds: 3600
    description: "Claude Opus - 架构驱动因素提炼、架构草案、复杂修订和最终定稿"

  cc-deepseek:
    provider: claude
    command: "{DEEPSEEK_COMMAND}"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write"
    timeout_seconds: 3600
    description: "DeepSeek - 架构审查、遗漏识别和反向风险检查"

  codex:
    provider: codex
    command: "{CODEX_COMMAND}"
    cwd: "{project_root}"
    sandbox: workspace-write
    timeout_seconds: 3600
    description: "Codex - 保留给需要本地验证的架构后续节点"
