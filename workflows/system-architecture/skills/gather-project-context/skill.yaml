skill:
  name: gather-project-context
  version: "1"
  description: "项目上下文收集节点规范——消费 Architecture Command collect 注入的上游产物，不自行翻静态文档"
  policy:
    allowed_decisions:
      - done
      - fail
      - blocked
    forbidden_actions:
      - "输出架构方案"
      - "输出 constraints 或 optimization function"
      - "编写代码"
      - "替用户裁决需求"
      - "自行读取项目需求文档目录下的原始 PRD（那是 Evidence，不是 Context）"
      - "自行读取项目 README / AGENTS.md 等开发指引推断技术栈或架构基线（可能含已废弃的架构基准）"
      - "在 collect 注入的上下文缺失时回退到静态文档（应标记为风险项）"
  content: |
    # Gather Project Context Node

    本节点是 system-architecture 工作流的前置步骤。目标是把 Architecture Command 的 collect
    已注入的上游产物 + 现有实现资产收集为结构化的 `project_analysis`，让后续架构节点基于
    完整的项目上下文做决策。

    ## R9 硬约束：消费注入的上下文，不要自己去翻静态文档

    本节点的需求上下文已由 Architecture Command 的 collect 按 artifact_id / lineage_id
    聚合并注入。**Canonical Requirement（final_requirement）已是唯一 SoT**，原始 PRD 是
    Evidence 不是 Context。

    **禁止（否则 R9 失效，会把废弃架构喂给下游）：**
    - 禁止自行读取项目需求文档目录下的原始 PRD——`sources:` 指针仅供必要时人工追溯，
      不作为本节点输入。
    - 禁止自行读取项目 README / AGENTS.md 等开发指引推断技术栈或架构基线——这类文档
      可能指向已废弃的架构基准。技术栈应从 goal / project_context 中获取；
      如缺失，标记为风险项（"技术栈上下文缺失"），不要回退到静态文档。

    ## 允许读取的内容

    1. **collect 注入的上游产物**（首要来源）：
       - final_requirement（Seed Artifact）：Canonical Requirement，含完整需求实体、
         规则、约束、验收标准、Evidence Index。从 goal 中嵌入的路径读取。
       - 如本次是修订既有 lineage：collect 还会注入该 lineage 的历史 Runtime Artifact
         （final_architecture / data_model 历史版本），读它们理解当前架构基线。
    2. **现有代码资产**（运行时事实，不属于"静态文档井"）：
       先用 Glob 探明项目实际技术栈与目录结构（不要假设某种语言的固定布局），
       再按发现的布局读取以下类别的资产（如存在）：
       - 现有数据模型 / ORM 实体定义
       - 现有数据库 DDL 或 schema 迁移文件
       - 现有 API 路由与接口契约
       - 现有前端页面与组件
       项目用何种语言/框架由探索结果决定，不预设 Python/Go/某栈的固定路径。

    ## 输出产物 project_analysis 必须包含

    ```markdown
    # Project Analysis

    ## 1. 原始产品需求摘要
    - 产品定位和一句话描述
    - 核心业务流程
    - 页面信息架构（列出所有页面和页面目标）
    - 核心业务对象和字段需求
    - 关键业务规则和口径
    - 非功能需求
    - 明确的一期范围和一期不做事项

    ## 2. 已确定技术栈
    - 后端框架、数据库、缓存、消息队列
    - 前端框架和组件库
    - 基础设施（容器化、CI/CD）
    - 已确定不用的技术

    ## 3. 现有数据模型
    - 如存在 ORM 模型：列出所有实体、核心字段、关系
    - 如存在迁移文件：总结当前 schema 版本和关键变更
    - 如不存在代码资产：明确标注"尚无实现"，并给出需求文档中隐含的数据对象清单

    ## 4. 现有 API 接口
    - 如存在路由定义：列出端点、方法、入参出参
    - 如不存在：标注"尚无实现"

    ## 5. 现有前端页面
    - 如存在页面组件：列出页面路径和核心功能
    - 如不存在：标注"尚无实现"

    ## 6. 差距分析
    - 需求定义的能力 vs 现有实现的覆盖情况（含 v1.0→v1.1 的增量范围）
    - 关键缺口列表
    - 现有实现中可能与需求冲突的约束

    ## 7. 上下文缺失风险
    - 标注哪些信息本应从 collect 注入但不可用（如"缺少历史架构基线""技术栈上下文缺失"）
    ```

    ## 判断标准

    - `done`: 已消费 collect 注入的上游产物并探索现有代码资产，产物完整覆盖所有维度。
    - `blocked`: collect 未注入必需的上游产物（如缺 final_requirement），且无法继续。
    - `fail`: 发现根本性冲突或不可调和的输入矛盾。
