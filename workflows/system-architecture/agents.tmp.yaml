# Agent 配置
# 本文件为纳入版本库的默认模板：命令使用通用默认（claude/codex），开箱即用。
# 个人专用 wrapper（如 cc-opus/cc-deepseek）在本地未跟踪的 agents.yaml 中覆盖。

agents:
  claude:
    provider: claude
    command: "claude"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write"
    timeout_seconds: 3600
    description: "Claude Opus - 架构驱动因素提炼、架构草案、复杂修订和最终定稿"

  deepseek:
    provider: claude
    command: "claude"
    cwd: "{project_root}"
    permission_mode: default
    allowed_tools: "Read,Grep,Glob,Write"
    timeout_seconds: 3600
    description: "DeepSeek - 架构审查、遗漏识别和反向风险检查"

  codex:
    provider: codex
    command: "codex"
    cwd: "{project_root}"
    sandbox: workspace-write
    timeout_seconds: 3600
    description: "Codex - 保留给需要本地验证的架构后续节点"
