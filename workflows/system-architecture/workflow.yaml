# system-architecture Workflow（v2 — lineage-aware）
# 根据已澄清需求形成系统架构:
#   gather_context -> extract_drivers -> structure_constraints_objectives -> draft_architecture
#   -> evaluation_gate
#     approve -> architecture_freeze -> data_model
#     revise  -> conflict_revision -> evaluation_gate
#
# v2 变更（2026-07-08，据 lineage-as-command-runtime）:
#   - gather_context 改写：消费 Architecture Command 的 collect 注入的上下文，不再自行翻静态文档（R9）
#   - 新增 data_model 节点：architecture_freeze 之后的确定性投影（R2），输出独立 artifact
#   - 本 workflow 做系统架构方案，不做代码实现，不替代需求澄清。

name: system-architecture
version: "2"
description: |
  消费 Architecture Command 注入的上下文（含 final_requirement Seed Artifact 及 lineage 信息），
  形成可审查、可追溯的系统架构产物。工作流显式建模 Context Gathering、Drivers、
  Constraints & Objectives、Draft Architecture、Evaluation Gate、Conflict-driven Revision、
  Architecture Freeze + ADR 和 Data Model 八层。

initial_state: gather_context

guards:
  max_visits: 3
  # 含人工 gate（architecture_review），墙钟含等待人工裁决时长，任何有限值都会误杀 continue，故设 0（关闭）
  max_duration_minutes: 0
  max_retries: 2
  on_guard_failed: failed

terminal_states:
  - done
  - failed
  - cancelled

required_skills:
  - agent-workflow-lifecycle
  - gather-project-context

tasks:
  gather_context:
    instruction: |
      消费 Architecture Command 的 collect 注入的上下文，产出结构化的 project_analysis。

      ## 上下文消费（R9 硬约束——不要自己去翻静态文档）

      本节点的输入已由 Architecture Command 的 collect 按以下规则聚合并注入到上下文中：
      - 按 artifact_id 定位 Seed Artifact（final_requirement），其 Canonical Requirement 已包含
        完整的需求实体、规则、约束、验收标准和 Evidence Index。
      - 如本次 Architecture Command 运行是修订既有 lineage，collect 还会注入该 lineage 的
        上游 Runtime Artifact（final_architecture / data_model / module_breakdown 的历史版本）。
      - 命令层的 goal 文本中已嵌入了本链上游产物的路径和摘要。

      **禁止以下行为（否则 R9 失效）：**
      1. 禁止自行去项目需求文档目录翻原始 PRD——Canonical Requirement 已是 SoT，
         原始 PRD 是 Evidence 不是 Context。sources: 指针指向原始 PRD，仅用于必要时人工追溯，
         不作为本节点的输入。
      2. 禁止自行去读项目 README / AGENTS.md 等开发指引了解"技术栈 / 项目结构"——
         这些信息应在 Architecture Command 的 goal 或 project_context 中已提供。
         如缺失，标记为风险项（"技术栈上下文缺失"），不要自动回退到静态文档。

      **允许的读取（只读注入的上下文 + 探索代码资产）：**
      1. 消费 goal 中嵌入的 final_requirement 路径和摘要。
      2. 如上下文提供了既有 lineage 产物（final_architecture / data_model 历史版本），
         读它们以理解当前架构基线。
      3. 探索代码资产（如有）：先用 Glob 探明项目实际技术栈与目录布局，
         再读取现有数据模型 / DDL / API 路由 / 前端页面等资产。这些是运行时事实，
         不属于"静态文档井"；不预设某种语言的固定路径。

      ## 产物 project_analysis 必须包含

      1. 需求摘要（从注入的 final_requirement 提取：定位、流程、实体、规则、范围）
      2. 已确定技术栈（从 goal/project_context 提取，不可从项目 README/AGENTS.md 推断）
      3. 现有数据模型（探索项目实际的模型/DDL 布局，标注"尚无"如有缺口）
      4. 现有 API 接口（探索项目实际的路由/接口代码，标注"尚无"如有缺口）
      5. 现有前端页面（探索项目实际的前端代码，标注"尚无"如有缺口）
      6. 差距分析（需求 vs 现有实现，含跨版本的增量范围）
      7. 上下文缺失风险：标注哪些信息本应从 collect 注入但不可用（如"缺少历史架构基线"）

      本节点不输出架构方案、constraints 或 optimization function。
    agent: claude
    input:
      - final_requirement
      - goal
      - project_context
    output: project_analysis
    skills:
      - gather-project-context
    allowed_decisions:
      - done
      - fail
      - blocked

  extract_drivers:
    instruction: |
      阅读 final_requirement、goal 和 project_context，提炼系统架构的 Drivers。

      如果缺少 final_requirement，可基于 goal 和 project_context 继续，但必须标记需求未澄清带来的风险。
      本节点只提炼驱动因素，不输出约束优先级、不输出完整架构方案、不做代码实现计划。

      必须包含:
      1. Business Goals: 业务目标、成功指标和关键用户价值
      2. Technical Goals: 技术目标、演进目标和质量诉求
      3. Key Use Cases: 关键用例、核心流程和外部参与方
      4. Data Drivers: 关键数据对象、数据生命周期和一致性诉求
      5. Integration Drivers: 外部系统、集成点和边界上下文
      6. Implicit Assumptions: 必须显式化的隐含假设
      7. Driver Risks: 会显著影响架构的风险项
    agent: claude
    input:
      - project_analysis
      - final_requirement
      - goal
      - project_context
    output: architecture_drivers
    skills:
      - architecture-drivers
    allowed_decisions:
      - done
      - fail
      - blocked

  structure_constraints_objectives:
    instruction: |
      基于 architecture_drivers、final_requirement 和 project_context，结构化 Constraints & Objectives。

      本节点是架构控制面，目标是把“感觉合理”转化为可审查的约束空间。
      不输出架构草案，不做技术选型结论，不替用户批准约束放宽。

      必须包含:
      1. Hard Constraints: 不可违反约束，包括 SLA、成本上限、技术栈限制、合规/安全要求
      2. Soft Constraints: 优化目标，包括可扩展性、可维护性、延迟目标、复杂度、可观测性等
      3. Optimization Function: 优先级函数，例如 cost < latency < scalability < complexity，并解释含义
      4. Constraint Source: 每条约束来自 final_requirement、project_context、显式假设还是推导
      5. Measurement / Verification: 每条约束如何被验证或评分
      6. Approval Required: 哪些约束若要 relaxation 必须显式审批
      7. Unresolved Constraint Questions: 仍需用户确认的问题
    agent: claude
    input:
      - project_analysis
      - architecture_drivers
      - final_requirement
      - project_context
    output: constraints_objectives
    skills:
      - constraints-objectives
    allowed_decisions:
      - done
      - fail
      - blocked

  draft_architecture:
    instruction: |
      基于 architecture_drivers 和 constraints_objectives 设计系统架构草案。

      架构草案必须逐条对齐 constraint。每个组件必须标注服务哪个 driver，
      以及覆盖哪些 hard/soft constraints。不得写代码，不得把实现任务拆成开发计划。
      对无法确定的选型必须列出备选方案、取舍依据和待确认问题。

      每个组件必须使用以下结构:
      Component:
      Responsibility:
      Driver Mapping:
      Constraint Coverage:

      必须包含:
      1. 架构目标、设计原则和范围边界
      2. 上下文图说明: 用户、外部系统、系统边界
      3. 逻辑组件划分和职责，并逐项写 Driver Mapping 与 Constraint Coverage
      4. 关键运行时流程和交互序列
      5. **跨语言/跨进程集成方案**（如需求中存在非主栈组件——如 Python Agent/Skill +
         Go 主系统——则必须显式设计）:
         a. 通信协议（REST / gRPC / 进程调用 / 消息队列）及选型理由
         b. 部署拓扑（独立服务 / sidecar / 函数调用 / 容器），含启动顺序和健康检查
         c. 数据序列化格式和接口契约（请求/响应 schema、错误码约定）
         d. 故障隔离和降级策略（Agent/Skill 不可用时主系统的行为）
         e. 运维归属（监控/日志/版本升级由哪侧负责）
      6. 数据模型、存储边界、数据流和一致性策略
      7. API / 事件 / 集成契约草案
      8. Hard Constraints 合规说明
      9. Soft Constraints 优化策略
      10. 技术选型建议及备选方案取舍
      11. 安全、权限、审计和隐私考虑
      12. 可观测性、部署、扩展和故障恢复策略
      13. 开放问题、风险和后续验证建议
    agent: claude
    input:
      - project_analysis
      - architecture_drivers
      - constraints_objectives
      - final_requirement
      - project_context
    output: architecture_draft
    version_strategy: increment
    skills:
      - architecture-draft
    allowed_decisions:
      - done
      - fail
      - blocked

  evaluation_gate:
    instruction: |
      基于 architecture_drivers、constraints_objectives 和最新架构方案执行结构化 Evaluation Gate。

      只做评估，不直接修改方案，不写代码。若已有上一轮 evaluation_report 和 conflict_revision_doc，
      必须核对上一轮 violation / conflict 是否已被解决。

      必须输出评分矩阵:
      | Dimension | Score | Explanation |
      |-----------|-------|-------------|
      | constraint compliance | pass/fail | 是否违反 hard constraints |
      | scalability | 1-5 |  |
      | complexity | 1-5 |  |
      | failure isolation | 1-5 |  |
      | cost efficiency | 1-5 |  |

      必须额外包含:
      1. Blocker List: 必须修复项
      2. Violation List: hard constraint 违反项，含证据、影响和对应架构位置
      3. Trade-off Conflict List: soft constraints 或 optimization function 之间的冲突
      4. Relaxation Requests: 任何需要放宽 hard constraint 的事项，必须标记为显式审批
      5. Residual Risks: 即使 approve 也保留的风险

      决策:
      - approve: constraint compliance 为 pass，且无 blocker，可进入 Architecture Freeze
      - revise: 存在可修复 blocker、violation 或 trade-off conflict，回到 conflict_revision
      - reject: 方案方向或输入不可接受，终止

      输出 evaluation_report，并在 TaskResult decision 中使用 approve / revise / reject。
    agent: deepseek
    input:
      - project_analysis
      - architecture_drivers
      - constraints_objectives
      - architecture_draft:latest
      - architecture_draft:all
      - conflict_revision_doc:latest
      - conflict_revision_doc:all
      - evaluation_report:latest
      - final_requirement
      - project_context
    output: evaluation_report
    version_strategy: increment
    skills:
      - evaluation-gate
    allowed_decisions:
      - approve
      - revise
      - reject
      - fail
      - blocked

  architecture_review:
    instruction: |
      人工审查已通过 Evaluation Gate 的架构方案。这是本工作流唯一的 Human Gate。

      架构方案的机器打分（评分矩阵/blocker/violation/trade-off conflict）已由上游 evaluation_gate
      LLM 门兜住（见 evaluation_report），本节点只审脚本与 LLM 打分兜不住的语义判断，不重复核对评分。

      ## 审查内容

      呈现 architecture_draft:latest（最新通过评估的方案）与 evaluation_report:latest（评估结论），
      供人审查以下语义维度：

      1. **组件划分合理性**：逻辑组件边界是否内聚、职责是否清晰、有无遗漏或冗余组件？
      2. **驱动映射完整性**：每个组件的 Driver Mapping 是否成立，关键 driver 是否都有组件承接？
      3. **约束覆盖真实性**：Constraint Coverage 是否名副其实（组件声称覆盖某约束，是否真的满足），
         而非仅编号挂靠？
      4. **技术选型取舍**：选型理由与备选方案取舍是否可接受，有无被忽略的更优选项？
      5. **跨语言/跨进程集成**（如存在非主栈组件）：通信协议、部署拓扑、故障隔离设计是否合理？
      6. **evaluation_report 残留风险复核**：评估门 approve 时保留的 Residual Risks / Relaxation
         Requests，人工确认是否可接受。

      ## 决策（二元 gate，对齐 module-breakdown / requirement-understanding 范式）

      本节点是 Human Gate，执行完成后由 Runner 暂停，等待外部通过 continue 命令注入决策：
      - **approve**：进入 architecture_freeze 冻结。若审查发现需修订的问题，把具体修订意见写进
        人工裁决文件（见下），architecture_freeze 会读取并应用后再冻结——引擎 human gate 只支持
        approve/reject，无独立 revise 回流。
      - **reject**：方案方向不可接受，进入 failed 终止。

      ## 产物 architecture_review 必须包含

      1. 六个审查维度的逐条结论（通过/存在问题）
      2. 若有问题：每条具体到「组件/决策 + 问题描述 + 建议修复方向」
      3. **人工裁决文件模板**（供人填写后经 continue --input 注入 architecture_freeze 应用）：
         - 审查结论：approve / reject
         - 若 approve 但需修订：逐条列出"组件/决策 → 修订指令"，供 architecture_freeze 应用

      ## 约束

      - 人审的是架构方案的语义质量（组件/驱动映射/约束覆盖/选型），不重复核对评估门的机器打分
      - 不自行修改架构方案——修订指令写进裁决文件，交 architecture_freeze 应用
      - 约束放宽（Constraint Relaxation）的审批在裁决文件中显式签字，节点不能替用户批准
      - **禁止在产物正文输出 YAML frontmatter 或 lineage/artifact_id 标识**——frontmatter 由命令层 attach 维护
    agent: claude
    input:
      - architecture_draft:latest
      - evaluation_report:latest
      - constraints_objectives
      - architecture_drivers
      - final_requirement
      - project_context
    output: architecture_review
    skills:
      - architecture-review
    allowed_decisions:
      - approve
      - reject
      - fail
      - blocked

  conflict_revision:
    instruction: |
      根据 evaluation_report 中的 Violation List 和 Trade-off Conflict List 进行冲突驱动修订。

      禁止自由修改。输入必须以 violation list 和 trade-off conflict list 为准。
      对任何 constraint relaxation，必须标记为需要显式审批，不能自行批准。

      每个 conflict 必须输出 resolution strategy，且只能属于:
      - trade-off acceptance: 接受权衡，并说明为什么符合 optimization function
      - architecture change: 修改架构，并说明影响的 component / data flow / contract
      - constraint relaxation: 请求放宽约束，并说明审批项、风险和替代方案

      输出 conflict_revision_doc，必须包含:
      1. Violation Resolution Table: 每条 violation 的处理策略和修订结果
      2. Trade-off Conflict Resolution Table: 每条 conflict 的 resolution strategy
      3. Constraint Relaxation Requests: 需要显式审批的约束放宽请求
      4. 完整的修订后架构方案
      5. 相对上一版 architecture_draft 或 conflict_revision_doc 的关键变更
      6. 剩余风险和待确认问题

      使用 done 表示本轮冲突修订完成。
    agent: claude
    input:
      - project_analysis
      - architecture_drivers
      - constraints_objectives
      - architecture_draft:latest
      - evaluation_report:latest
      - conflict_revision_doc:all
      - final_requirement
      - project_context
    output: conflict_revision_doc
    version_strategy: increment
    skills:
      - conflict-driven-revision
    allowed_decisions:
      - done
      - fail
      - blocked

  architecture_freeze:
    instruction: |
      应用人工裁决意见并冻结架构方案，基于 architecture_drivers、constraints_objectives、
      architecture_draft、evaluation_report 和历次 conflict_revision_doc，形成 Architecture Freeze
      + ADR 产物 final_architecture。

      必须以最新通过 Evaluation Gate 和 Human Gate 的方案为准，并冻结关键架构决策。
      不写代码，不输出详细开发排期。

      ## 应用人工裁决（对齐 module-breakdown 的 finalize）

      - 读取经 continue --input 注入的人工裁决文件（human_clarification）：逐条应用其中
        "组件/决策 → 修订指令" 到最新架构方案后再冻结。
      - 裁决文件缺失或无修订项时，直接冻结最新通过评估的方案。
      - 只应用裁决明确列出的修订，不做新的架构决策、不自行发挥；若修订指令要求的变更
        会推翻已冻结的评估结论，标记为待确认而非私自改写。

      必须包含:
      1. Architecture Freeze Summary
      2. 架构目标、范围和非目标
      3. Drivers / Constraints / Objectives 到架构决策的追踪矩阵
      4. 系统上下文、组件职责和边界
      5. 关键业务流程、运行时交互和错误处理
      6. 数据架构、存储边界、一致性和迁移考虑
      7. API / 事件 / 集成契约
      8. Evaluation Gate 评分矩阵摘要和最终通过依据
      9. Hard Constraints 合规声明
      10. Soft Constraints 权衡说明
      11. 风险、开放问题和需要验证的假设
      12. 可交给 spec-dev / 开发工作流的架构输入摘要

      ADR 必须使用以下格式逐条写入:
      Decision:
      Context:
      Options considered:
      Trade-offs:
      Final choice:
      Reversibility cost:
    agent: claude
    input:
      - project_analysis
      - architecture_drivers
      - constraints_objectives
      - architecture_draft:all
      - evaluation_report:all
      - conflict_revision_doc:all
      - architecture_review
      - human_clarification
      - final_requirement
      - project_context
    output: final_architecture
    skills:
      - architecture-freeze
    allowed_decisions:
      - done
      - fail
      - blocked

  verdict_consistency_check:
    instruction: |
      Verdict 一致性确定性门（provider: command）：核对 final_architecture 的 `freeze restatement`
      机读块是否忠实回指 evaluation_report 的 `eval verdict`——无极性翻转、无漏回指。
      堵住"后节点静默改写前节点已判定结论"的漂移（本次实例：eval 判"CR-24 已定"、freeze
      转述成"降 OQ-01 待定"）。存在极性翻转或漏回指则退出码 1，工作流失败。

      本节点不经 LLM 判断，与 evaluation_gate 正交；只做极性可判定的确定性核对。
    agent: verdict_consistency_check
    input:
      - evaluation_report
      - final_architecture
    output: verdict_consistency_report
    allowed_decisions:
      - done
      - fail

  data_model:
    instruction: |
      基于 architecture_freeze 冻结的架构决策，产出确定性的数据模型 DDL 产物 data_model。
      这是 architecture_freeze 的确定性投影，不是新一轮架构决策——只 Apply 不 Reason。

      输入来源:
      - final_architecture 中的数据架构决策（实体模型、存储边界、一致性策略、索引策略）
      - final_requirement 中的实体定义和字段约束
      - 既有 data_model（如 collect 注入了同 lineage 的历史版本），用于识别增量变更

      产物 data_model 必须包含:
      1. 实体清单与关系图（列出所有新增/变更实体，标注与 v1.0 的关系）
      2. 每张新表的 DDL（CREATE TABLE，含列定义、类型、约束、默认值、注释）
      3. 每张变更表的 ALTER TABLE migration（如对既有表加列，必须显式写 migration）
      4. 索引设计（含设计理由——为哪些查询路径服务）
      5. 数据一致性策略（事务边界、外键/应用层约束、唯一性保证）
      6. 与 v1.0 数据模型的共存与隔离说明（新增 schema/表 还是扩表现有 schema）
      7. 数据迁移注意事项（存量数据如何处理，如"新列默认 NULL""存量需回刷"等）

      约束:
      - 实体边界遵守 V15 约定：需求层定义"实体有哪些字段"，架构层决定"键/关系/物理表结构"。
        不要在 data_model 中重新讨论"这个字段该不该有"——那是需求的事。
      - 如果有字段无法从 final_architecture + final_requirement 推导出物理类型/约束，
        标记为待确认并给出默认建议。
      - 不输出代码（ORM 模型/DAO/Repository 是模块拆分或 spec-dev 的事）。

      输出格式:
      - DDL 使用 SQL fenced block（```sql），含完整 COMMENT ON 注释。
      - 实体关系使用 Mermaid erDiagram 或表格。
      - Migration 按顺序编号，标注依赖关系。
    agent: claude
    input:
      - final_architecture
      - final_requirement
      - project_analysis
      - project_context
    output: data_model
    skills:
      - architecture-freeze
    allowed_decisions:
      - done
      - fail
      - blocked

  ddl_conflict_check:
    instruction: |
      DDL 冲突确定性门（provider: command）：证明 data_model 产物的 DDL 与项目真实数据库基线
      不冲突——新建表名不撞既有物理表、新建 migration 编号不撞既有编号。经脚本比对，
      存在表名撞库或编号撞号则退出码 1，工作流失败。

      本节点不经 LLM 判断（会与 evaluation_gate 的 LLM 盲点重合造成假 pass），
      与 evaluation_gate 正交，补上"LLM 放过撞库/撞编号"的确定性防线。
      脚本探测 docs/data-model/ 下 ddl/ 与 migrations/ 作为真实基线（可用 DDL_BASELINE_DIR 覆盖）。
    agent: ddl_conflict_check
    input:
      - data_model
    output: ddl_conflict_report
    allowed_decisions:
      - done
      - fail

states:
  gather_context:
    task: gather_context
    on:
      done: extract_drivers
      fail: failed
      blocked: failed
    default: failed
    description: "收集原始需求文档、技术栈说明和现有实现资产"

  extract_drivers:
    task: extract_drivers
    on:
      done: structure_constraints_objectives
      fail: failed
      blocked: failed
    default: failed
    description: "提炼业务目标、技术目标和隐含假设"

  structure_constraints_objectives:
    task: structure_constraints_objectives
    on:
      done: draft_architecture
      fail: failed
      blocked: failed
    default: failed
    description: "结构化 hard constraints、soft constraints 和 optimization function"

  draft_architecture:
    task: draft_architecture
    on:
      done: evaluation_gate
      fail: failed
      blocked: failed
    default: failed
    description: "生成逐条对齐约束和 driver 的系统架构草案"

  evaluation_gate:
    task: evaluation_gate
    on:
      approve: architecture_review
      revise: conflict_revision
      reject: failed
      fail: failed
      blocked: failed
    default: failed
    description: "结构化评分、blocker、violation 和 trade-off conflict gate（LLM 机器门）"

  architecture_review:
    task: architecture_review
    on:
      approve: architecture_freeze
      reject: failed
      fail: failed
      blocked: failed
    default: failed
    gate: true
    description: "Human Gate（二元 approve/reject）——人审已收敛的架构方案；修订意见经 continue --input 注入，architecture_freeze 应用"

  conflict_revision:
    task: conflict_revision
    on:
      done: evaluation_gate
      fail: failed
      blocked: failed
    default: failed
    description: "基于 violation 和 conflict 的冲突驱动修订"

  architecture_freeze:
    task: architecture_freeze
    on:
      done: verdict_consistency_check
      fail: failed
      blocked: failed
    default: failed
    description: "冻结架构并生成 ADR"

  verdict_consistency_check:
    task: verdict_consistency_check
    on:
      done: data_model
      fail: failed
    default: failed
    description: "确定性门——核对 freeze 转述忠实于 eval 判定，无极性翻转/漏回指"

  data_model:
    task: data_model
    on:
      done: ddl_conflict_check
      fail: failed
      blocked: failed
    default: failed
    description: "确定性投影——从冻结架构产出 DDL 和实体关系"

  ddl_conflict_check:
    task: ddl_conflict_check
    on:
      done: done
      fail: failed
    default: failed
    description: "确定性门——DDL 表名/migration 编号与真实 DB 基线冲突检测"

  done:
    task: ""
    terminal: true
    description: "工作流成功完成"

  failed:
    task: ""
    terminal: true
    description: "工作流失败终止"

  cancelled:
    task: ""
    terminal: true
    description: "工作流被取消"
