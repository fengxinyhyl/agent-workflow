# 产物流配置
# 定义每个 state 的预期产物流名称和类型

outputs:
  plan_doc:
    type: markdown
    description: "实现计划文档"
    produced_by:
      - plan

  review_doc:
    type: markdown
    description: "审查意见"
    produced_by:
      - review

  advice_doc:
    type: markdown
    description: "修改建议"
    produced_by:
      - advise

  execution_report:
    type: markdown
    description: "执行报告"
    produced_by:
      - execute
